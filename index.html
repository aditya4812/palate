<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>Palate</title>

<!-- PWA / iOS home-screen -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#120d08">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Palate">
<link rel="apple-touch-icon" href="icon-180.png">

<style>
  :root{
    --bg:#120d08; --bg2:#1c140c; --card:#241a10; --line:#3a2a18; --rail:#5c4a30;
    --amber:#e0a020; --amber-bright:#f5c049; --foam:#f3efe4; --text:#ece3d4;
    --muted:#9c8a72; --danger:#e0654a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:radial-gradient(120% 70% at 50% -10%, #2a1d10 0%, var(--bg) 55%) fixed, var(--bg);
    color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    min-height:100vh;
    padding:max(16px, env(safe-area-inset-top)) 14px calc(40px + env(safe-area-inset-bottom)) 14px;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:560px;margin:0 auto}
  header{padding:4px 2px 6px}
  h1{font-family:"Iowan Old Style",Georgia,serif;font-size:32px;font-weight:700;margin:0;color:var(--foam)}
  .tag{color:var(--muted);font-size:13px;margin-top:2px}
  .stats{display:flex;margin-top:14px;border:1px solid var(--line);border-radius:16px;
    background:linear-gradient(180deg,var(--bg2),#160f09);overflow:hidden}
  .stat{flex:1;text-align:center;padding:12px 6px;position:relative}
  .stat + .stat::before{content:"";position:absolute;left:0;top:18%;height:64%;width:1px;background:var(--line)}
  .stat b{display:block;font-family:Georgia,serif;font-size:21px;color:var(--amber-bright);line-height:1}
  .stat span{display:block;font-size:11px;color:var(--muted);margin-top:5px;letter-spacing:.4px;text-transform:uppercase}
  .search{width:100%;margin-top:14px;padding:11px 13px;border-radius:12px;border:1px solid var(--line);
    background:#16100a;color:var(--text);font-size:15px;outline:none}
  .search::placeholder{color:#6f6049}
  .legend{display:flex;align-items:center;gap:8px;margin-top:11px;font-size:11px;color:var(--muted);letter-spacing:.3px}
  .legend .bar{flex:1;height:7px;border-radius:5px;
    background:linear-gradient(90deg,hsl(0 60% 42%),hsl(36 60% 42%),hsl(72 60% 42%),hsl(120 60% 42%))}
  .legend2{margin-top:7px;font-size:10.5px;color:#82704f;letter-spacing:.2px;line-height:1.4}
  .legend2 .ex{border:1px dashed #82704f;border-radius:5px;padding:0 4px;opacity:.6}
  .legend2 .le{border:1px solid #cdb98e;color:#cdb98e;border-radius:5px;padding:0 4px}

  .tree{margin-top:13px;border:1px solid var(--line);border-radius:16px;overflow:hidden;
    background:linear-gradient(180deg,var(--card),#1b130b)}
  .row{display:flex;align-items:center;min-height:48px;padding:6px 14px 6px 10px;cursor:pointer;
    border-top:1px solid rgba(58,42,24,.45);transition:background .12s}
  .row:first-child{border-top:none}
  .row:active{background:rgba(224,160,32,.08)}
  .rail{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;white-space:pre;
    color:var(--rail);font-size:16px;line-height:1;flex:none;letter-spacing:1px}
  .caret{flex:none;width:16px;text-align:center;color:var(--muted);font-size:10px}
  .nm{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:15px}
  .row.cat   > .nm{font-family:Georgia,serif;font-weight:700;color:var(--foam);font-size:16px}
  .row.style > .nm{font-family:Georgia,serif;font-weight:600;color:var(--foam)}
  .row.beer  > .nm{color:var(--text)}
  .row.beer  .by{color:var(--muted);font-size:12px}
  .row.add   > .nm{color:var(--amber);font-weight:600;font-size:14px}
  .cnt{flex:none;font-size:11px;color:var(--muted);margin-right:9px}
  .badge{display:inline-flex;align-items:center;justify-content:center;flex:none;min-width:46px;
    padding:4px 8px;border-radius:8px;margin-left:6px;
    font-family:Georgia,serif;font-size:14px;font-weight:700;letter-spacing:.3px}
  .badge.real{color:#1a1206}
  .badge.proj{background:transparent;border:1px solid;font-style:italic}
  .empty{padding:40px 20px;text-align:center;color:var(--muted);font-size:14px}

  .foot{margin-top:22px;display:flex;gap:10px;justify-content:center}
  .foot button{background:none;border:1px solid var(--line);color:var(--muted);
    font-size:12px;padding:9px 14px;border-radius:10px;cursor:pointer}
  .foot button:active{color:var(--amber);border-color:var(--amber)}

  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(3px);
    opacity:0;pointer-events:none;transition:opacity .2s;z-index:12}
  .scrim.show{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:13;background:var(--bg2);border-top:1px solid var(--line);
    border-radius:22px 22px 0 0;padding:8px 18px calc(24px + env(safe-area-inset-bottom));
    max-width:560px;margin:0 auto;max-height:92vh;overflow-y:auto;
    transform:translateY(100%);transition:transform .25s cubic-bezier(.32,.72,0,1)}
  .sheet.show{transform:translateY(0)}
  .grab{width:38px;height:4px;border-radius:3px;background:#4a3826;margin:8px auto 14px}
  .sheet h3{font-family:Georgia,serif;font-size:20px;margin:0;color:var(--foam)}
  label{display:block;font-size:12px;color:var(--muted);margin:14px 0 6px;letter-spacing:.4px;text-transform:uppercase}
  .opt{text-transform:none;color:#6f6049}
  input[type=text],input[type=date],select,textarea{width:100%;padding:13px;border-radius:11px;border:1px solid var(--line);
    background:#16100a;color:var(--text);font-size:16px;font-family:inherit;outline:none}
  input:focus,select:focus,textarea:focus{border-color:var(--amber)}
  textarea{resize:vertical;min-height:70px;line-height:1.45}
  select{appearance:none;-webkit-appearance:none;
    background-image:linear-gradient(45deg,transparent 50%,var(--amber) 50%),linear-gradient(135deg,var(--amber) 50%,transparent 50%);
    background-position:calc(100% - 18px) 19px,calc(100% - 13px) 19px;background-size:5px 5px;background-repeat:no-repeat}
  .ratingRow{display:flex;align-items:center;gap:14px}
  input[type=range]{flex:1;-webkit-appearance:none;appearance:none;height:8px;border-radius:6px;
    background:linear-gradient(90deg,hsl(0 60% 42%),hsl(60 60% 42%),hsl(120 60% 42%));outline:none;border:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:26px;height:26px;border-radius:50%;
    background:linear-gradient(180deg,var(--amber-bright),var(--amber));border:2px solid #1a1206;cursor:pointer}
  input[type=range]::-moz-range-thumb{width:26px;height:26px;border-radius:50%;background:var(--amber);border:2px solid #1a1206}
  .actions{display:flex;gap:10px;margin-top:24px}
  .btn{flex:1;padding:14px;border-radius:12px;border:1px solid var(--line);
    background:#1d150d;color:var(--text);font-size:15px;font-weight:600;cursor:pointer}
  .btn.primary{background:linear-gradient(180deg,var(--amber-bright),var(--amber));color:#211505;border:none}
  .btn.primary:disabled{opacity:.45}
  .btn.del{background:none;border:none;color:var(--danger);margin-top:10px;width:100%;padding:12px;font-size:14px;cursor:pointer}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Palate</h1>
    <div class="tag">Your beer family tree · rated out of 10 · all on this device</div>
    <div class="stats">
      <div class="stat"><b id="s-count">0</b><span>logged</span></div>
      <div class="stat"><b id="s-avg">–</b><span>avg / 10</span></div>
      <div class="stat"><b id="s-styles">0</b><span>styles tried</span></div>
    </div>
    <input class="search" id="search" placeholder="Search a style or beer…">
    <div class="legend"><span>Skip</span><div class="bar"></div><span>Love</span></div>
    <div class="legend2">~ projected · <span class="ex">faint</span> expert guess · <span class="le">solid</span> learned from your ratings</div>
  </header>

  <div class="tree" id="tree"></div>

  <div class="foot">
    <button id="expandBtn">⤢ Expand all</button>
    <button id="exportBtn">⬇ Backup</button>
    <button id="importBtn">⬆ Restore</button>
    <input type="file" id="importFile" accept="application/json" hidden>
  </div>
</div>

<!-- Add / edit sheet -->
<div class="scrim" id="editScrim"></div>
<div class="sheet" id="editSheet">
  <div class="grab"></div>
  <h3 id="editTitle">Log a beer</h3>
  <label>Beer name</label>
  <input type="text" id="f-name" placeholder="e.g. Yuzu KSA" autocomplete="off">
  <label>Brewery <span class="opt">(optional)</span></label>
  <input type="text" id="f-brewery" placeholder="e.g. Kona Brewing" autocomplete="off">
  <label>Style <span class="opt">(where it sits in the tree)</span></label>
  <select id="f-leaf"></select>
  <label>Rating <span class="opt">(1–10, half steps)</span></label>
  <div class="ratingRow">
    <input type="range" id="f-rating" min="1" max="10" step="0.5" value="8">
    <span id="f-rating-badge"></span>
  </div>
  <label>Tasting notes <span class="opt">(optional)</span></label>
  <textarea id="f-notes" placeholder="Bright citrus, crisp finish…"></textarea>
  <label>Date tried</label>
  <input type="date" id="f-date">
  <div class="actions">
    <button class="btn" id="cancelBtn">Cancel</button>
    <button class="btn primary" id="saveBtn">Save</button>
  </div>
  <button class="btn del" id="deleteBtn" hidden>Delete this entry</button>
</div>

<script>
/* ============================================================
   Beer family tree (curated, BJCP-grounded).
   family → subcategory → style → your logged beers.
   Each style carries `prior` (expert 1–10 enjoyment estimate for
   this drinker = cold-start projection) and `feat` = sensory vector
   [bitter, malt, body, sour, roast, fruit, hop, spice, abv, srm].
   ============================================================ */
const S = (id,name,prior,feat)=>({id,name,prior,feat});
const TAXONOMY = {
  id:"beer", name:"Beer", kids:[
    { id:"lagers", name:"Lagers", kids:[
      { id:"pale-lagers", name:"Pale Lagers", kids:[
        S("helles","Helles",9,[3,5,4,0,0,1,2,0,5.0,4]),
        S("czech-pilsner","Czech Pilsner",8,[6,5,5,0,0,1,5,0,4.8,4.5]),
        S("german-pilsner","German Pilsner",6,[6,3,3,0,0,1,6,0,4.8,3]),
        S("italian-pilsner","Italian Pilsner",8.5,[6,3,3,0,0,1,7,0,5.5,4]),
        S("euro-pale-lager","Euro Pale Lager",8.5,[3,3,3,0,0,1,2,0,5.0,4]),
        S("american-lager","American Lager",6,[2,2,2,0,0,0,1,0,4.6,2.5]),
      ]},
      { id:"dark-lagers", name:"Amber & Dark Lagers", kids:[
        S("vienna-lager","Vienna Lager",6.5,[3,6,5,0,1,1,2,0,5.0,12]),
        S("marzen","Märzen / Festbier",7,[3,7,6,0,1,1,2,0,5.8,10]),
        S("dortmunder","Dortmunder Export",7,[4,5,5,0,0,1,3,0,5.5,5]),
        S("munich-dunkel","Munich Dunkel",5.5,[3,7,6,0,3,1,1,0,5.0,22]),
        S("schwarzbier","Schwarzbier",5,[4,4,4,0,5,1,2,0,4.9,24]),
      ]},
      { id:"bock-family", name:"Bock Family", kids:[
        S("maibock","Maibock / Helles Bock",6,[4,7,6,0,0,2,3,0,6.8,7]),
        S("doppelbock","Doppelbock",4.5,[3,9,8,0,2,3,1,0,8.0,16]),
        S("bock","Dunkles Bock",4.5,[3,8,7,0,2,2,1,0,6.7,18]),
      ]},
      { id:"specialty-lagers", name:"Specialty Lagers", kids:[
        S("baltic-porter","Baltic Porter",4.5,[4,7,8,0,5,4,1,0,8.0,24]),
        S("rauchbier","Rauchbier",4,[3,6,6,0,2,1,2,1,5.4,17]),
      ]},
    ]},
    { id:"ales", name:"Ales", kids:[
      { id:"wheat", name:"Wheat Beers", kids:[
        S("hefeweizen","Hefeweizen",9,[2,4,5,1,0,7,1,7,5.0,4]),
        S("witbier","Witbier",9,[2,4,4,1,0,5,2,6,5.0,3]),
        S("american-wheat","American Wheat",7.5,[3,4,4,1,0,2,3,1,4.8,4]),
        S("dunkelweizen","Dunkelweizen",7,[2,6,5,1,2,7,1,6,5.0,18]),
        S("weizenbock","Weizenbock",5.5,[3,8,7,1,2,8,1,7,7.5,16]),
      ]},
      { id:"fruit-specialty", name:"Fruit & Specialty", kids:[
        S("radler","Radler / Shandy",9,[1,4,3,3,0,7,1,0,3.0,4]),
        S("fruit-wheat","Fruit Wheat Ale",9,[2,4,4,1,0,8,2,2,4.7,5]),
      ]},
      { id:"pale-ales", name:"Pale Ales & IPAs", kids:[
        S("american-pale","American Pale Ale",4.5,[5,4,4,0,0,4,6,0,5.3,7]),
        S("english-pale","English Pale Ale / ESB",5.5,[5,6,5,0,1,4,3,0,5.4,12]),
        S("session-ipa","Session IPA",4.5,[5,2,3,0,0,5,7,0,4.2,6]),
        S("west-coast-ipa","West Coast IPA",3,[8,3,4,0,0,6,8,0,6.7,9]),
        S("neipa","New England IPA",4,[4,4,6,0,0,9,9,0,7.0,5]),
        S("double-ipa","Double IPA",2.5,[9,4,5,0,0,7,9,0,8.5,9]),
      ]},
      { id:"amber-brown", name:"Amber & Brown Ales", kids:[
        S("blonde","Blonde / Golden Ale",8.5,[3,4,4,0,0,2,2,0,4.8,4]),
        S("american-amber","American Amber",6,[5,6,5,0,1,3,5,0,5.3,13]),
        S("irish-red","Irish Red",6.5,[3,5,4,0,2,2,1,0,4.5,11]),
        S("brown-ale","Brown Ale",5.5,[3,6,5,0,3,3,2,0,5.0,18]),
        S("scottish","Scottish Ale",5.5,[3,6,5,0,2,3,1,0,4.5,16]),
      ]},
      { id:"belgian", name:"Belgian Ales", kids:[
        S("belgian-blonde","Belgian Blonde",6,[3,5,5,0,0,5,2,5,6.5,5]),
        S("saison","Saison",5.5,[5,3,3,1,0,6,3,7,6.0,8]),
        S("dubbel","Dubbel",4.5,[3,7,6,0,1,7,1,5,7.0,14]),
        S("tripel","Tripel",4,[5,5,5,0,0,6,3,6,8.5,5]),
        S("belgian-golden-strong","Belgian Golden Strong",3.5,[5,4,4,0,0,7,3,6,9.0,4.5]),
        S("quad","Quad / Dark Strong",3.5,[3,8,8,0,1,8,1,6,10,17]),
      ]},
      { id:"stouts-porters", name:"Stouts & Porters", kids:[
        S("porter","Porter",5.5,[4,6,5,0,6,2,2,0,5.5,30]),
        S("irish-stout","Irish Dry Stout",6.5,[6,3,5,0,8,1,1,0,4.4,32]),
        S("nitro-stout","Nitro Stout",7,[4,4,7,0,7,1,1,0,4.4,32]),
        S("oatmeal-stout","Oatmeal Stout",6,[4,6,8,0,6,2,1,0,5.0,30]),
        S("milk-stout","Sweet / Milk Stout",6,[3,8,7,0,6,2,1,0,5.0,35]),
        S("imperial-stout","Imperial Stout",3.5,[7,8,9,0,9,5,2,0,10,38]),
      ]},
      { id:"strong-ales", name:"Strong Ales", kids:[
        S("american-barleywine","American Barleywine",3,[8,8,9,0,1,5,6,0,10,14]),
        S("wee-heavy","Wee Heavy",4,[3,9,8,0,2,4,1,0,8.0,20]),
      ]},
    ]},
    { id:"hybrid", name:"Hybrid", kids:[
      { id:"rhenish", name:"Rhenish Hybrids", kids:[
        S("kolsch","Kölsch",9,[3,4,3,0,0,3,2,0,4.8,4]),
        S("fruit-kolsch","Fruit Kölsch",9,[3,4,3,1,0,7,2,0,4.8,5]),
        S("altbier","Altbier",6,[5,6,5,0,1,2,3,0,4.8,13]),
      ]},
      { id:"american-hybrid", name:"American Hybrids", kids:[
        S("cream-ale","Cream Ale",8,[2,3,3,0,0,1,1,0,4.9,3.5]),
        S("california-common","California Common",6,[5,5,5,0,1,2,4,0,4.9,11]),
      ]},
    ]},
    { id:"sour-wild", name:"Sour & Wild", kids:[
      { id:"kettle-sours", name:"Kettle & Wheat Sours", kids:[
        S("gose","Gose",7,[1,2,3,7,0,3,1,2,4.5,3]),
        S("berliner","Berliner Weisse",6.5,[1,1,2,8,0,3,0,1,3.3,2.5]),
      ]},
      { id:"wild-aged", name:"Wild & Aged", kids:[
        S("lambic","Lambic / Gueuze",6,[1,1,3,9,0,5,0,3,6.5,5]),
        S("flanders-red","Flanders Red",5.5,[2,4,4,7,1,8,0,1,5.5,14]),
        S("fruited-sour","Fruited Sour",7,[1,3,4,8,0,9,1,1,5.5,8]),
      ]},
    ]},
  ],
};

/* Index taxonomy: id → node, parent map, flat style list. */
const CAT = {}, PARENT = {}, STYLES = [];
(function index(node, parent){
  CAT[node.id]=node; PARENT[node.id]=parent?parent.id:null;
  if(node.kids) node.kids.forEach(k=>index(k, node));
  else STYLES.push({id:node.id, name:node.name, group:parent?parent.name:""});
})(TAXONOMY, null);
const isStyle = node => !node.kids;
const styleExists = id => !!(CAT[id] && isStyle(CAT[id]));
const subOf = id => PARENT[id];
const famOf = id => PARENT[PARENT[id]];

/* Legacy style-id renames from earlier app versions, so old logged beers
   keep resolving after a taxonomy change (otherwise they orphan + vanish). */
const LEGACY = {
  "yuzu-ksa":"fruit-kolsch",
  "dunkel":"munich-dunkel",
  "kolsch-style":"kolsch",
  "blonde-ale":"blonde",
};
async function migrateEntries(){
  let changed = false;
  for(const e of entries){
    if(!e.leafId || styleExists(e.leafId)) continue;
    const mapped = LEGACY[e.leafId];
    if(mapped && styleExists(mapped)){ e.leafId = mapped; await put(e); changed = true; }
  }
  if(changed) entries = await getAll();
}

/* The 8 favourites, seeded once on first run at 8.0 (editable). */
const SEEDS = [
  { leafId:"witbier",         name:"Blue Moon",        brewery:"Molson Coors" },
  { leafId:"blonde",          name:"Kona Big Wave",    brewery:"Kona Brewing" },
  { leafId:"hefeweizen",      name:"Hefeweizen",       brewery:"" },
  { leafId:"euro-pale-lager", name:"Forgtmenot Lager", brewery:"" },
  { leafId:"euro-pale-lager", name:"Heineken",         brewery:"Heineken" },
  { leafId:"irish-stout",     name:"Guinness",         brewery:"Guinness" },
  { leafId:"italian-pilsner", name:"Birra Nazionale",  brewery:"" },
  { leafId:"fruit-kolsch",    name:"Yuzu KSA",         brewery:"",
    notes:"Yuzu KSA blends our classic kölsch-style ale with the punchy aroma and tartness of yuzu juice for an unbelievably refreshing beverage. Known as radler or shandy in different parts of the world, this blend of pale beer and citrus juice is a low-alcohol treat that's perfect for summer adventures. With vibrant aromas of tart citrus and verdant pine, Yuzu KSA is an entirely new KSA experience." },
];

/* ---------- IndexedDB storage ---------- */
const DB_NAME = "palate", STORE = "entries";
let db;
function openDB(){
  return new Promise((res,rej)=>{
    const r = indexedDB.open(DB_NAME,1);
    r.onupgradeneeded = e=>{ const d=e.target.result;
      if(!d.objectStoreNames.contains(STORE)) d.createObjectStore(STORE,{keyPath:"id"}); };
    r.onsuccess = e=>{db=e.target.result;res();};
    r.onerror = e=>rej(e.target.error);
  });
}
function tx(mode){return db.transaction(STORE,mode).objectStore(STORE);}
function getAll(){return new Promise((res,rej)=>{const r=tx("readonly").getAll();r.onsuccess=()=>res(r.result||[]);r.onerror=()=>rej(r.error);});}
function put(b){return new Promise((res,rej)=>{const r=tx("readwrite").put(b);r.onsuccess=res;r.onerror=()=>rej(r.error);});}
function del(id){return new Promise((res,rej)=>{const r=tx("readwrite").delete(id);r.onsuccess=res;r.onerror=()=>rej(r.error);});}

/* ---------- State + helpers ---------- */
let entries = [], byLeaf = {}, expanded = new Set(), editingId = null;
const $ = s=>document.querySelector(s);
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function fmtDate(iso){const d=new Date(iso+"T00:00:00");return d.toLocaleDateString(undefined,{year:"numeric",month:"short",day:"numeric"});}
function esc(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function fmt(v){return (Math.round(v*10)/10).toFixed(1);}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
function buildByLeaf(){ byLeaf={}; for(const e of entries){ if(!e.leafId) continue; (byLeaf[e.leafId]=byLeaf[e.leafId]||[]).push(e); } }

/* ============================================================
   Learning projection engine (content-based, library-free).
   Predicts an unrated style's rating from the user's real ratings
   of similar styles (feature + tree similarity), shrunk to the
   style's expert prior, mean-centered for personal bias.
   ============================================================ */
const NDIM = 10;
const FWEIGHT = [1.2,1.0,1.0,1.3,1.2,1.2,1.1,1.0,0.8,0.8];  // emphasise defining axes
const PRIOR_K = 3, PRIOR_DECAY = 6, MEAN_K0 = 2, GLOBAL_MEAN = 5.5, SIM_FLOOR = 0.1, BLEND = 0.6;
let ZFEAT = {}, GAMMA = 1;

function buildModel(){
  const mean=Array(NDIM).fill(0), sd=Array(NDIM).fill(0);
  for(const s of STYLES){ const f=CAT[s.id].feat; for(let d=0;d<NDIM;d++) mean[d]+=f[d]; }
  for(let d=0;d<NDIM;d++) mean[d]/=STYLES.length;
  for(const s of STYLES){ const f=CAT[s.id].feat; for(let d=0;d<NDIM;d++) sd[d]+=(f[d]-mean[d])**2; }
  for(let d=0;d<NDIM;d++){ sd[d]=Math.sqrt(sd[d]/STYLES.length) || 1; }
  ZFEAT={};
  for(const s of STYLES){ const f=CAT[s.id].feat, z=[]; for(let d=0;d<NDIM;d++) z[d]=(f[d]-mean[d])/sd[d]; ZFEAT[s.id]=z; }
  // gamma = median pairwise distance (kernel bandwidth)
  const ds=[];
  for(let i=0;i<STYLES.length;i++) for(let j=i+1;j<STYLES.length;j++) ds.push(featDist(STYLES[i].id, STYLES[j].id));
  ds.sort((a,b)=>a-b);
  GAMMA = ds.length ? (ds[Math.floor(ds.length/2)] || 1) : 1;
}
function featDist(a,b){
  const za=ZFEAT[a], zb=ZFEAT[b];
  if(!za || !zb) return 99;                 // unknown style → effectively no feature similarity
  let s=0;
  for(let d=0;d<NDIM;d++){ const diff=za[d]-zb[d]; s+=FWEIGHT[d]*diff*diff; }
  return Math.sqrt(s);
}
function treeSim(a,b){ return subOf(a)===subOf(b) ? 0.7 : (famOf(a)===famOf(b) ? 0.4 : 0); }

function ratedStyles(){
  const out=[];
  for(const sid in byLeaf){
    if(!styleExists(sid)) continue;          // ignore orphaned/legacy ids — no feature vector
    const arr=byLeaf[sid];
    if(arr&&arr.length) out.push({id:sid, r:arr.reduce((a,b)=>a+b.rating,0)/arr.length});
  }
  return out;
}
/* The expert prior's weight fades as evidence accumulates — more rated styles,
   and especially more *spread* in those ratings (rating things low as well as
   high is what teaches the model your dislikes). Approaches 0, so over time the
   data + feature similarity drive everything; the prior only guides the corners
   of the tree you haven't explored yet. */
function priorWeight(rated){
  const n = rated.length;
  if(!n) return PRIOR_K;
  const mean = rated.reduce((a,x)=>a+x.r,0)/n;
  const spread = Math.sqrt(rated.reduce((a,x)=>a+(x.r-mean)**2,0)/n);   // 0 if all identical
  const evidence = n * (0.4 + 0.6*Math.min(1, spread/2));
  return PRIOR_K / (1 + evidence/PRIOR_DECAY);
}
/* → {value, confidence} for a style with no logged beers. */
function projectStyle(id){
  const prior = CAT[id].prior;
  const rated = ratedStyles();
  if(!rated.length) return {value:prior, confidence:0};
  const m = (MEAN_K0*GLOBAL_MEAN + rated.reduce((a,x)=>a+x.r,0)) / (MEAN_K0 + rated.length);
  const k = priorWeight(rated);
  let sumW=0, sumWR=0;
  for(const j of rated){
    if(j.id===id) continue;
    const sf = Math.exp(-(featDist(id,j.id)**2) / (2*GAMMA*GAMMA));
    const sim = BLEND*sf + (1-BLEND)*treeSim(id,j.id);
    if(sim < SIM_FLOOR) continue;
    sumW += sim; sumWR += sim*(j.r - m);
  }
  const value = clamp(m + (k*(prior-m) + sumWR)/(k + sumW), 1, 10);
  return {value, confidence: sumW/(k + sumW)};
}

/* Effective rating of any node: real avg if beers below, else learned projection. */
function effective(node){
  if(node.kids){
    const rs = node.kids.map(effective);
    return { value: rs.reduce((a,c)=>a+c.value,0)/rs.length,
             isReal: rs.some(c=>c.isReal),
             count:  rs.reduce((a,c)=>a+c.count,0),
             confidence: rs.reduce((a,c)=>a+(c.confidence||0),0)/rs.length };
  }
  const beers = byLeaf[node.id]||[];
  if(beers.length) return {value: beers.reduce((a,b)=>a+b.rating,0)/beers.length, isReal:true, count:beers.length, confidence:1};
  const p = projectStyle(node.id);
  return {value:p.value, isReal:false, count:0, confidence:p.confidence};
}

/* ---------- Rating colour + badge (confidence-aware) ---------- */
function badgeHTML(value, isReal, confidence){
  const hue = Math.max(0, Math.min(120, value*12));
  if(isReal) return `<span class="badge real" style="background:hsl(${hue} 58% 42%)">${fmt(value)}</span>`;
  const c = confidence||0;
  const col = `hsl(${hue} ${Math.round(38+22*c)}% ${Math.round(62-8*c)}%)`;
  const op = (0.55 + 0.45*c).toFixed(2);
  const bs = c>=0.25 ? "solid" : "dashed";
  return `<span class="badge proj" style="color:${col};border-color:${col};opacity:${op};border-style:${bs}">~${fmt(value)}</span>`;
}

/* ============================================================
   Render: indented tree with file-explorer branch rails.
   ============================================================ */
function rail(cells, isRoot, isLast){
  if(isRoot) return "";
  let s=""; for(const c of cells) s += (c==="vert" ? "│ " : "  ");
  return s + (isLast ? "└ " : "├ ");
}
function renderCat(node, cells, isRoot, isLast){
  const eff = effective(node);
  const open = expanded.has(node.id);
  const kind = isStyle(node) ? "style" : "cat";
  let h = `<div class="row ${kind}" data-id="${node.id}" data-kind="cat">`+
            `<span class="rail">${rail(cells,isRoot,isLast)}</span>`+
            `<span class="caret">${open?"▾":"▸"}</span>`+
            `<span class="nm">${esc(node.name)}</span>`+
            (!open && eff.count ? `<span class="cnt">${eff.count}</span>` : "")+
            badgeHTML(eff.value, eff.isReal, eff.confidence)+
          `</div>`;
  if(!open) return h;
  const childCells = isRoot ? [] : cells.concat([ isLast ? "blank" : "vert" ]);
  if(node.kids){
    node.kids.forEach((k,j)=> h += renderCat(k, childCells, false, j===node.kids.length-1));
  } else {
    const beers = (byLeaf[node.id]||[]).slice().sort((a,b)=> b.rating-a.rating || (b.created||0)-(a.created||0));
    beers.forEach(b=> h += renderBeer(b, childCells, false));
    h += `<div class="row add" data-id="add_${node.id}" data-kind="add" data-style="${node.id}">`+
           `<span class="rail">${rail(childCells,false,true)}</span><span class="caret"></span>`+
           `<span class="nm">＋ Log a beer here</span></div>`;
  }
  return h;
}
function renderBeer(b, cells, isLast){
  return `<div class="row beer" data-kind="beer" data-beer="${b.id}" data-style="${b.leafId}">`+
           `<span class="rail">${rail(cells,false,isLast)}</span><span class="caret"></span>`+
           `<span class="nm">${esc(b.name)}${b.brewery?` <span class="by">· ${esc(b.brewery)}</span>`:""}</span>`+
           badgeHTML(b.rating, true)+
         `</div>`;
}
function renderTree(){
  buildByLeaf();
  const q = $("#search").value.trim().toLowerCase();
  if(q) return renderSearch(q);
  const fams = TAXONOMY.kids;
  $("#tree").innerHTML = fams.map((f,i)=>renderCat(f, [], true, i===fams.length-1)).join("");
}
function renderSearch(q){
  const out = [];
  for(const s of STYLES) if(s.name.toLowerCase().includes(q)){
    const e=effective(CAT[s.id]);
    out.push(`<div class="row style" data-id="${s.id}" data-kind="jump"><span class="caret">▸</span>`+
             `<span class="nm">${esc(s.name)} <span class="by" style="color:var(--muted)">· ${esc(s.group)}</span></span>`+
             badgeHTML(e.value, e.isReal, e.confidence)+`</div>`);
  }
  for(const e of entries) if(e.leafId && (e.name.toLowerCase().includes(q)||(e.brewery||"").toLowerCase().includes(q)))
    out.push(`<div class="row beer" data-kind="beer" data-beer="${e.id}" data-style="${e.leafId}"><span class="caret">🍺</span>`+
             `<span class="nm">${esc(e.name)} <span class="by">· ${esc(CAT[e.leafId]?.name||"")}</span></span>`+
             badgeHTML(e.rating,true)+`</div>`);
  $("#tree").innerHTML = out.length ? out.join("") : `<div class="empty">No matches for “${esc(q)}”.</div>`;
}
function renderStats(){
  const logged = entries.filter(e=>e.leafId);
  $("#s-count").textContent = logged.length;
  $("#s-avg").textContent = logged.length ? fmt(logged.reduce((a,b)=>a+b.rating,0)/logged.length) : "–";
  $("#s-styles").textContent = new Set(logged.map(e=>e.leafId)).size;
}
function renderAll(){ buildByLeaf(); renderStats(); renderTree(); }

/* ---------- Expansion ---------- */
function expandAncestors(styleId){ let p=styleId; while(p){ expanded.add(p); p=PARENT[p]; } }
function toggle(id){ expanded.has(id) ? expanded.delete(id) : expanded.add(id); }

/* ---------- Add / edit sheet ---------- */
function buildLeafSelect(){
  const groups={};
  for(const s of STYLES){ (groups[s.group]=groups[s.group]||[]).push(s); }
  $("#f-leaf").innerHTML = Object.entries(groups).map(([g,items])=>
    `<optgroup label="${g}">`+items.map(i=>`<option value="${i.id}">${i.name}</option>`).join("")+`</optgroup>`
  ).join("");
}
function updateRatingBadge(){ $("#f-rating-badge").innerHTML = badgeHTML(parseFloat($("#f-rating").value), true); }
function openEdit(styleId, beer){
  editingId = beer ? beer.id : null;
  $("#editTitle").textContent = beer ? "Edit beer" : "Log a beer";
  buildLeafSelect();
  $("#f-name").value    = beer?.name || "";
  $("#f-brewery").value = beer?.brewery || "";
  $("#f-notes").value   = beer?.notes || "";
  $("#f-leaf").value    = beer?.leafId || styleId || STYLES[0].id;
  $("#f-date").value    = beer?.date || new Date().toISOString().slice(0,10);
  $("#f-rating").value  = beer?.rating ?? 8;
  updateRatingBadge();
  $("#deleteBtn").hidden = !beer;
  validate();
  $("#editScrim").classList.add("show");
  $("#editSheet").classList.add("show");
}
function closeEdit(){ editingId=null; $("#editScrim").classList.remove("show"); $("#editSheet").classList.remove("show"); }
function validate(){ $("#saveBtn").disabled = !$("#f-name").value.trim(); }
async function save(){
  const name = $("#f-name").value.trim(); if(!name) return;
  const existing = editingId ? entries.find(b=>b.id===editingId) : null;
  const styleId = $("#f-leaf").value;
  const entry = {
    id: editingId || uid(), leafId: styleId, name,
    brewery: $("#f-brewery").value.trim(),
    rating: parseFloat($("#f-rating").value),
    notes: $("#f-notes").value.trim(),
    date: $("#f-date").value || new Date().toISOString().slice(0,10),
    created: existing ? (existing.created||Date.now()) : Date.now(),
  };
  await put(entry);
  entries = await getAll();
  expandAncestors(styleId);
  closeEdit(); renderAll();
}
async function removeCurrent(){
  if(!editingId) return;
  await del(editingId);
  entries = await getAll();
  closeEdit(); renderAll();
}

/* ---------- Backup / restore ---------- */
function exportData(){
  const blob = new Blob([JSON.stringify(entries,null,2)],{type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `palate-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}
function importData(file){
  const reader = new FileReader();
  reader.onload = async ()=>{
    try{
      const data = JSON.parse(reader.result);
      if(!Array.isArray(data)) throw 0;
      for(const b of data){ if(b && b.id && b.name) await put(b); }
      entries = await getAll(); renderAll();
      alert("Backup restored.");
    }catch(e){ alert("That file couldn't be read as a Palate backup."); }
  };
  reader.readAsText(file);
}

/* ---------- Wire up ---------- */
$("#tree").addEventListener("click", e=>{
  const row = e.target.closest(".row"); if(!row) return;
  const kind = row.dataset.kind;
  if(kind==="beer"){
    const beer = entries.find(b=>b.id===row.dataset.beer);
    if(beer){ $("#search").value=""; openEdit(beer.leafId, beer); }
    return;
  }
  if(kind==="add"){ openEdit(row.dataset.style, null); return; }
  if(kind==="jump"){
    expandAncestors(row.dataset.id); $("#search").value=""; renderTree();
    const el = $("#tree").querySelector(`[data-id="${row.dataset.id}"]`);
    if(el) el.scrollIntoView({block:"center"});
    return;
  }
  toggle(row.dataset.id); renderTree();
});
$("#search").addEventListener("input", renderTree);
$("#cancelBtn").onclick = closeEdit;
$("#editScrim").onclick = closeEdit;
$("#saveBtn").onclick = save;
$("#deleteBtn").onclick = removeCurrent;
$("#f-name").addEventListener("input", validate);
$("#f-rating").addEventListener("input", updateRatingBadge);
$("#exportBtn").onclick = exportData;
$("#importBtn").onclick = ()=>$("#importFile").click();
$("#importFile").onchange = e=>{ if(e.target.files[0]) importData(e.target.files[0]); };
$("#expandBtn").addEventListener("click", ()=>{
  const allCats = Object.keys(CAT);
  const allOpen = allCats.every(id=>expanded.has(id));
  if(allOpen){ expanded = new Set(["lagers","ales","hybrid","sour-wild"]); $("#expandBtn").textContent="⤢ Expand all"; }
  else { expanded = new Set(allCats); $("#expandBtn").textContent="⤡ Collapse"; }
  renderTree();
});

/* ---------- Boot ---------- */
(async ()=>{
  buildModel();
  await openDB();
  entries = await getAll();
  if(entries.length === 0){
    const today = new Date().toISOString().slice(0,10);
    let i=0;
    for(const s of SEEDS){
      await put({ id:uid(), leafId:s.leafId, name:s.name, brewery:s.brewery||"",
                  rating:8, notes:s.notes||"", date:today, created:Date.now()+(i++) });
    }
    entries = await getAll();
  }
  await migrateEntries();          // heal legacy style ids from older versions
  buildByLeaf();
  expanded = new Set(["lagers","ales","hybrid","sour-wild"]);
  for(const e of entries) if(e.leafId) expandAncestors(e.leafId);
  renderAll();
  if("serviceWorker" in navigator){ navigator.serviceWorker.register("sw.js").catch(()=>{}); }
})();
</script>
</body>
</html>
