<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>Palate</title>

<!-- PWA / iOS home-screen -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#121216">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Palate">
<link rel="apple-touch-icon" href="icon-180.png">

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Hanken+Grotesk:wght@400;500;600;700;800&family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700;12..96,800&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#0e0e12; --ink:#f3f3f5; --ink2:#cfcfd6; --mut:#9a9aa5; --mut2:#6f6f7a; --mut3:#8a8a95;
    --line:#26262e; --line2:#1f1f26; --panel:#15151a; --field:#1c1c22; --field-bd:#2a2a33;
    --bric:"Bricolage Grotesque",-apple-system,system-ui,sans-serif;
    --hank:"Hanken Grotesk",-apple-system,system-ui,sans-serif;
    --mono:"IBM Plex Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
    --accent:hsl(106 56% 52%);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;height:100%}
  body{
    background:radial-gradient(130% 75% at 50% -8%,#1c1c22 0%,#121216 55%,#0e0e12 100%) fixed,var(--bg);
    color:var(--ink);font-family:var(--hank);-webkit-font-smoothing:antialiased;
    height:100dvh;overflow:hidden;
  }
  .app{max-width:460px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;position:relative;
    padding:max(8px,env(safe-area-inset-top)) 0 0}

  /* Top bar */
  .topbar{flex:none;display:flex;align-items:center;justify-content:space-between;padding:8px 20px 10px}
  .brand{font-family:var(--bric);font-weight:800;font-size:27px;letter-spacing:-.02em;color:var(--ink)}
  .seg{display:flex;background:var(--field);border:1px solid var(--field-bd);border-radius:11px;padding:3px}
  .seg button{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
    color:var(--mut2);background:none;border:none;padding:6px 12px;border-radius:8px;cursor:pointer}
  .seg button.on{background:#2b2b34;color:var(--ink)}
  .tb-right{display:flex;align-items:center;gap:10px}
  .addbtn{width:36px;height:36px;border-radius:50%;border:none;cursor:pointer;flex:none;
    background:linear-gradient(180deg,hsl(106 56% 56%),hsl(106 56% 46%));color:#08120a;font-size:22px;font-weight:600;
    display:flex;align-items:center;justify-content:center;box-shadow:0 6px 16px -6px hsl(106 60% 40% / .6)}
  .addbtn:active{transform:translateY(1px)}

  .views{flex:1;position:relative;overflow:hidden}
  .view{position:absolute;inset:0;display:flex;flex-direction:column}
  .view[hidden]{display:none}

  /* ---------- Browse ---------- */
  .b-head{flex:none;padding:2px 20px 12px}
  .b-sub{font-family:var(--mono);font-size:11.5px;color:var(--mut3);letter-spacing:.02em}
  .cov{margin-top:11px;height:6px;border-radius:4px;background:#26262e;overflow:hidden;position:relative}
  .cov-fill{position:absolute;inset:0;transform-origin:left;background:linear-gradient(90deg,hsl(150 36% 38%),hsl(106 56% 50%))}
  .cov-meta{display:flex;justify-content:space-between;margin-top:6px;font-family:var(--mono);font-size:10px;
    color:var(--mut2);letter-spacing:.08em}
  .links{display:flex;gap:16px;margin-top:11px;font-family:var(--mono);font-size:10px;letter-spacing:.08em;color:var(--mut2)}
  .links button{background:none;border:none;color:var(--mut2);font-family:inherit;font-size:inherit;letter-spacing:inherit;
    padding:0;cursor:pointer;text-transform:uppercase}
  .links button:active{color:var(--accent)}

  #tree{flex:1;overflow-y:auto;padding:4px 20px 8px}

  .region{margin-top:18px}
  .region:first-child{margin-top:6px}
  .region-head,.sub-head,.style-row{display:flex;align-items:center;justify-content:space-between;cursor:pointer}
  .region-head{padding-bottom:9px;border-bottom:1px solid var(--line)}
  .region-l{display:flex;align-items:center;gap:10px;min-width:0}
  .tri{font-size:11px;color:var(--mut2);flex:none;width:12px}
  .tri.on{color:var(--accent)}
  .region-nm{font-family:var(--bric);font-weight:700;font-size:19px;letter-spacing:-.01em;color:var(--ink);
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .region-r{display:flex;align-items:center;gap:10px;flex:none}
  .tried{font-family:var(--mono);font-size:10px;color:var(--mut2)}

  .subregion{padding-left:14px;border-left:1px solid var(--line);margin-top:10px}
  .sub-head{padding:5px 0}
  .sub-l{display:flex;align-items:center;gap:8px;min-width:0}
  .sub-nm{font-weight:600;font-size:14.5px;color:var(--ink2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .caret-sm{font-size:9px;color:var(--mut2);flex:none}
  .styles{padding-left:14px;border-left:1px solid var(--line2)}
  .style-row{padding:7px 0}
  .style-nm{font-size:14px;color:var(--mut);display:flex;align-items:center;gap:8px;min-width:0;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .style-nm.on{color:var(--ink)}
  .pill{font-family:var(--mono);font-size:9.5px;color:#0c0c0e;background:var(--accent);padding:1px 5px;border-radius:4px;
    letter-spacing:.04em;flex:none}
  .beer-line{font-family:var(--mono);font-size:10.5px;color:var(--mut2);padding:0 0 7px 2px;letter-spacing:.01em;cursor:pointer}
  .beer-line:active{color:var(--ink2)}

  .score{font-family:var(--mono);font-weight:600;font-size:12.5px;color:#e6e6ea;white-space:nowrap;flex:none}
  .score .dia{margin-right:5px}
  .score.proj{font-weight:500}
  .score.sm{font-size:12px}
  .empty{padding:40px 20px;text-align:center;color:var(--mut);font-size:14px}

  .searchwrap{flex:none;padding:10px 18px calc(14px + env(safe-area-inset-bottom));
    background:linear-gradient(180deg,transparent,#0e0e12 42%)}
  .searchbar{display:flex;align-items:center;gap:10px;background:var(--field);border:1px solid var(--field-bd);
    border-radius:14px;padding:11px 14px}
  .searchbar span{color:var(--mut2);font-family:var(--mono);font-size:14px}
  .searchbar input{flex:1;background:none;border:none;outline:none;color:var(--ink);font-size:14px;font-family:var(--mono)}
  .searchbar input::placeholder{color:var(--mut2)}

  /* ---------- Profile ---------- */
  #view-profile{overflow-y:auto;padding:2px 20px calc(24px + env(safe-area-inset-bottom))}
  .p-sub{font-family:var(--mono);font-size:11.5px;color:var(--mut3);margin-bottom:14px}
  .constellation{position:relative;height:300px;border-radius:16px;border:1px solid var(--line);overflow:hidden;
    background:linear-gradient(0deg,rgba(106,200,120,.05) 1px,transparent 1px) 0 0/100% 30px,
      linear-gradient(90deg,rgba(106,200,120,.05) 1px,transparent 1px) 0 0/30px 100%,
      radial-gradient(120% 100% at 22% 78%,rgba(106,200,120,.12),transparent 55%),#15151a}
  .ax{position:absolute;font-family:var(--mono);font-size:9px;color:#54545e;letter-spacing:.1em}
  .dot{position:absolute;border-radius:50%;transform:translate(-50%,-50%)}
  .you{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:3px}
  .you-ring{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--ink);display:flex;align-items:center;justify-content:center}
  .you-dot{width:6px;height:6px;border-radius:50%;background:var(--ink)}
  .you-lbl{font-family:var(--mono);font-size:9px;color:var(--ink);letter-spacing:.14em}
  .legend{display:flex;gap:14px;margin-top:8px;font-family:var(--mono);font-size:9.5px;color:var(--mut2);letter-spacing:.04em}
  .legend span{display:flex;align-items:center;gap:5px}
  .legend i{display:block;border-radius:50%}
  .pstats{display:grid;grid-template-columns:1fr 1fr;gap:1px;margin-top:16px;background:var(--line);
    border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .pstat{background:var(--panel);padding:13px 14px}
  .pstat .k{font-family:var(--mono);font-size:9.5px;color:var(--mut2);letter-spacing:.1em}
  .pstat .v{font-family:var(--bric);font-weight:800;font-size:24px;margin-top:3px}
  .pstat .v.sm{font-weight:700;font-size:19px;margin-top:6px}
  .pstat .v .u{font-size:14px;color:var(--mut2);font-weight:700}
  .psummary{margin-top:14px;font-size:13px;color:var(--mut);line-height:1.55}
  .psummary b{color:hsl(106 56% 60%)}

  /* ---------- Onboarding ---------- */
  #view-onboard[hidden]{display:none}
  #view-onboard{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;
    background:radial-gradient(130% 75% at 50% -8%,#1c1c22 0%,#121216 55%,#0e0e12 100%);
    padding:max(14px,env(safe-area-inset-top)) 0 0}
  .onb-head{flex:none;padding:6px 22px 4px}
  .onb-title{font-family:var(--bric);font-weight:800;font-size:26px;letter-spacing:-.02em;margin:10px 0 0;color:var(--ink)}
  .onb-intro{color:var(--mut);font-size:13.5px;line-height:1.5;margin:8px 0 0;max-width:380px}
  #onboard-list{flex:1;overflow-y:auto;padding:12px 22px 8px}
  .onb-row{display:flex;align-items:center;gap:12px;padding:13px 0;border-top:1px solid var(--line2)}
  .onb-row:first-child{border-top:none}
  .onb-info{flex:1;min-width:0}
  .onb-name{font-weight:600;font-size:15px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .onb-style{font-family:var(--mono);font-size:10.5px;color:var(--mut2);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .onb-rate{display:flex;align-items:center;gap:9px;flex:none}
  #view-onboard .onb-slider{width:84px;-webkit-appearance:none;appearance:none;height:6px;border-radius:5px;background:#2a2a33;outline:none;opacity:.55;transition:opacity .15s}
  #view-onboard .onb-row.touched .onb-slider{opacity:1;background:linear-gradient(90deg,hsl(0 60% 46%),hsl(60 56% 48%),hsl(120 56% 46%))}
  .onb-slider::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:#f3f3f5;border:2px solid #0c0c0e;cursor:pointer}
  .onb-slider::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:#f3f3f5;border:2px solid #0c0c0e}
  .onb-val{font-family:var(--mono);font-size:11.5px;min-width:52px;text-align:right}
  .onb-val.mut{color:var(--mut2)}
  .onb-clear{background:none;border:none;color:var(--mut2);cursor:pointer;font-size:12px;padding:2px;flex:none}
  .onb-foot{flex:none;padding:12px 22px calc(18px + env(safe-area-inset-bottom));background:linear-gradient(180deg,transparent,#0e0e12 45%)}
  .onb-skip{display:block;width:100%;margin-top:10px;background:none;border:none;color:var(--mut2);
    font-family:var(--mono);font-size:12px;cursor:pointer;letter-spacing:.04em}

  /* ---------- Edit sheet ---------- */
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.62);backdrop-filter:blur(3px);
    opacity:0;pointer-events:none;transition:opacity .2s;z-index:20}
  .scrim.show{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:21;background:#16161b;border-top:1px solid var(--line);
    border-radius:22px 22px 0 0;padding:8px 20px calc(24px + env(safe-area-inset-bottom));
    max-width:460px;margin:0 auto;max-height:92vh;overflow-y:auto;
    transform:translateY(100%);transition:transform .25s cubic-bezier(.32,.72,0,1)}
  .sheet.show{transform:translateY(0)}
  .grab{width:38px;height:4px;border-radius:3px;background:#3a3a44;margin:8px auto 16px}
  .sheet h3{font-family:var(--bric);font-weight:800;font-size:21px;margin:0;color:var(--ink)}
  label{display:block;font-family:var(--mono);font-size:11px;color:var(--mut2);margin:15px 0 6px;letter-spacing:.06em;text-transform:uppercase}
  .opt{text-transform:none;color:#55555f}
  input[type=text],input[type=date],select,textarea{width:100%;padding:13px;border-radius:12px;border:1px solid var(--field-bd);
    background:var(--field);color:var(--ink);font-size:16px;font-family:var(--hank);outline:none}
  input:focus,select:focus,textarea:focus{border-color:var(--accent)}
  textarea{resize:vertical;min-height:70px;line-height:1.45}
  select{appearance:none;-webkit-appearance:none;
    background-image:linear-gradient(45deg,transparent 50%,var(--mut) 50%),linear-gradient(135deg,var(--mut) 50%,transparent 50%);
    background-position:calc(100% - 18px) 20px,calc(100% - 13px) 20px;background-size:5px 5px;background-repeat:no-repeat}
  .ratingRow{display:flex;align-items:center;gap:14px}
  input[type=range]{flex:1;-webkit-appearance:none;appearance:none;height:8px;border-radius:6px;
    background:linear-gradient(90deg,hsl(0 60% 46%),hsl(60 56% 48%),hsl(120 56% 46%));outline:none;border:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:26px;height:26px;border-radius:50%;
    background:#f3f3f5;border:2px solid #0c0c0e;cursor:pointer}
  input[type=range]::-moz-range-thumb{width:26px;height:26px;border-radius:50%;background:#f3f3f5;border:2px solid #0c0c0e}
  .actions{display:flex;gap:10px;margin-top:24px}
  .btn{flex:1;padding:14px;border-radius:12px;border:1px solid var(--field-bd);background:var(--field);color:var(--ink);
    font-size:15px;font-weight:600;cursor:pointer;font-family:var(--hank)}
  .btn.primary{background:linear-gradient(180deg,hsl(106 56% 56%),hsl(106 56% 46%));color:#08120a;border:none}
  .btn.primary:disabled{opacity:.4}
  .btn.del{background:none;border:none;color:#e0654a;margin-top:10px;width:100%;padding:12px;font-size:14px;cursor:pointer}
  /* ---------- Beer-name autocomplete ---------- */
  .ac-wrap{position:relative}
  .ac-menu{position:absolute;left:0;right:0;top:calc(100% + 5px);z-index:30;background:#1c1c22;
    border:1px solid var(--field-bd);border-radius:12px;overflow-y:auto;max-height:248px;
    box-shadow:0 14px 34px rgba(0,0,0,.5)}
  .ac-item{padding:9px 13px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.045);display:flex;
    flex-direction:column;gap:1px}
  .ac-item:last-child{border-bottom:none}
  .ac-item.active{background:rgba(255,255,255,.07)}
  .ac-nm{font-family:var(--hank);font-size:15px;color:var(--ink)}
  .ac-nm b{color:var(--accent);font-weight:700}
  .ac-meta{font-family:var(--mono);font-size:10.5px;color:var(--mut2);letter-spacing:.03em}
  textarea.suggested{color:var(--mut2);font-style:italic}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand">Palate</div>
    <div class="tb-right">
      <button class="addbtn" id="addBtn" title="Log a beer">＋</button>
      <div class="seg">
        <button data-view="browse" class="on">Map</button>
        <button data-view="profile">Profile</button>
      </div>
    </div>
  </div>

  <div class="views">
    <!-- BROWSE -->
    <div class="view" id="view-browse">
      <div class="b-head">
        <div class="b-sub" id="b-sub">— logged · — / — styles</div>
        <div class="cov"><div class="cov-fill" id="cov-fill" style="transform:scaleX(0)"></div></div>
        <div class="cov-meta"><span>STYLES TRIED</span><span id="cov-pct">0%</span></div>
        <div class="links">
          <button id="expandBtn">Expand all</button>
          <button id="exportBtn">Backup</button>
          <button id="importBtn">Restore</button>
          <button id="startOverBtn">Start over</button>
          <input type="file" id="importFile" accept="application/json" hidden>
        </div>
      </div>
      <div id="tree"></div>
      <div class="searchwrap">
        <div class="searchbar"><span>⌕</span><input id="search" placeholder="Search styles &amp; beers"></div>
      </div>
    </div>

    <!-- PROFILE -->
    <div class="view" id="view-profile" hidden>
      <div class="p-sub">Your taste, mapped</div>
      <div class="constellation" id="constellation"></div>
      <div class="legend">
        <span><i style="width:9px;height:9px;background:hsl(100 58% 55%)"></i>logged</span>
        <span><i style="width:7px;height:7px;background:hsl(60 48% 56%);opacity:.5"></i>projected guess</span>
        <span><i style="width:14px;height:14px;border:1.4px solid var(--ink);background:transparent"></i>you</span>
      </div>
      <div class="pstats">
        <div class="pstat"><div class="k">AVG / 10</div><div class="v" id="st-avg" style="color:hsl(106 56% 56%)">–</div></div>
        <div class="pstat"><div class="k">RANGE</div><div class="v" id="st-range">–</div></div>
        <div class="pstat"><div class="k">STYLES TRIED</div><div class="v" id="st-styles">–</div></div>
        <div class="pstat"><div class="k">TOP FAMILY</div><div class="v sm" id="st-top">–</div></div>
      </div>
      <div class="psummary" id="p-summary"></div>
    </div>
  </div>

  <!-- ONBOARDING -->
  <div id="view-onboard" hidden>
    <div class="onb-head">
      <div class="brand">Palate</div>
      <h2 class="onb-title">Map your taste</h2>
      <p class="onb-intro">Rate a few classics so we can map your palate. Drag a slider to rate; skip any you haven't had.</p>
    </div>
    <div id="onboard-list"></div>
    <div class="onb-foot">
      <button class="btn primary" id="onbStart">Start mapping</button>
      <button class="onb-skip" id="onbSkip">Skip for now</button>
    </div>
  </div>
</div>

<!-- Add / edit sheet -->
<div class="scrim" id="editScrim"></div>
<div class="sheet" id="editSheet">
  <div class="grab"></div>
  <h3 id="editTitle">Log a beer</h3>
  <label>Beer name</label>
  <div class="ac-wrap">
    <input type="text" id="f-name" placeholder="e.g. Yuzu KSA" autocomplete="off">
    <div class="ac-menu" id="acMenu" hidden></div>
  </div>
  <label>Brewery <span class="opt">(optional)</span></label>
  <input type="text" id="f-brewery" placeholder="e.g. Kona Brewing" autocomplete="off">
  <label>Style</label>
  <select id="f-leaf"></select>
  <label>Rating <span class="opt">(1–10, half steps)</span></label>
  <div class="ratingRow">
    <input type="range" id="f-rating" min="1" max="10" step="0.5" value="8">
    <span id="f-rating-badge"></span>
  </div>
  <label>Tasting notes <span class="opt">(optional)</span></label>
  <textarea id="f-notes" placeholder="Bright citrus, crisp finish…"></textarea>
  <label>Date tried</label>
  <input type="date" id="f-date">
  <div class="actions">
    <button class="btn" id="cancelBtn">Cancel</button>
    <button class="btn primary" id="saveBtn">Save</button>
  </div>
  <button class="btn del" id="deleteBtn" hidden>Delete this entry</button>
</div>

<script src="catalog.js"></script>
<script>
/* ============================================================
   Beer family tree (curated, BJCP-grounded).
   family → subcategory → style → your logged beers.
   Each style carries `prior` (expert 1–10 enjoyment estimate for
   this drinker = cold-start projection) and `feat` = sensory vector
   [bitter, malt, body, sour, roast, fruit, hop, spice, abv, srm].
   ============================================================ */
const S = (id,name,feat)=>({id,name,feat});
const TAXONOMY = {
  id:"beer", name:"Beer", kids:[
    { id:"lagers", name:"Lagers", kids:[
      { id:"pale-lagers", name:"Pale Lagers", kids:[
        S("helles","Helles",[3,5,4,0,0,1,2,0,5.0,4]),
        S("czech-pilsner","Czech Pilsner",[6,5,5,0,0,1,5,0,4.8,4.5]),
        S("german-pilsner","German Pilsner",[6,3,3,0,0,1,6,0,4.8,3]),
        S("italian-pilsner","Italian Pilsner",[6,3,3,0,0,1,7,0,5.5,4]),
        S("euro-pale-lager","Euro Pale Lager",[3,3,3,0,0,1,2,0,5.0,4]),
        S("american-lager","American Lager",[2,2,2,0,0,0,1,0,4.6,2.5]),
      ]},
      { id:"dark-lagers", name:"Amber & Dark Lagers", kids:[
        S("vienna-lager","Vienna Lager",[3,6,5,0,1,1,2,0,5.0,12]),
        S("marzen","Märzen / Festbier",[3,7,6,0,1,1,2,0,5.8,10]),
        S("dortmunder","Dortmunder Export",[4,5,5,0,0,1,3,0,5.5,5]),
        S("munich-dunkel","Munich Dunkel",[3,7,6,0,3,1,1,0,5.0,22]),
        S("schwarzbier","Schwarzbier",[4,4,4,0,5,1,2,0,4.9,24]),
      ]},
      { id:"bock-family", name:"Bock Family", kids:[

/* Index taxonomy: id → node, parent map, flat style list. */
const CAT = {}, PARENT = {}, STYLES = [];
(function index(node, parent){
  CAT[node.id]=node; PARENT[node.id]=parent?parent.id:null;
  if(node.kids) node.kids.forEach(k=>index(k, node));
  else STYLES.push({id:node.id, name:node.name, group:parent?parent.name:""});
})(TAXONOMY, null);
const isStyle = node => !node.kids;
const styleExists = id => !!(CAT[id] && isStyle(CAT[id]));
const subOf = id => PARENT[id];
const famOf = id => PARENT[PARENT[id]];

/* Legacy style-id renames from earlier app versions. */
const LEGACY = { "yuzu-ksa":"fruit-kolsch", "dunkel":"munich-dunkel", "kolsch-style":"kolsch", "blonde-ale":"blonde" };
async function migrateEntries(){
  let changed = false;
  for(const e of entries){
    if(!e.leafId || styleExists(e.leafId)) continue;
    const mapped = LEGACY[e.leafId];
    if(mapped && styleExists(mapped)){ e.leafId = mapped; await put(e); changed = true; }
  }
  if(changed) entries = await getAll();
}

/* ---------- IndexedDB storage ---------- */
const DB_NAME = "palate", STORE = "entries";
let db;
function openDB(){
  return new Promise((res,rej)=>{
    const r = indexedDB.open(DB_NAME,1);
    r.onupgradeneeded = e=>{ const d=e.target.result;
      if(!d.objectStoreNames.contains(STORE)) d.createObjectStore(STORE,{keyPath:"id"}); };
    r.onsuccess = e=>{db=e.target.result;res();};
    r.onerror = e=>rej(e.target.error);
  });
}
function tx(mode){return db.transaction(STORE,mode).objectStore(STORE);}
function getAll(){return new Promise((res,rej)=>{const r=tx("readonly").getAll();r.onsuccess=()=>res(r.result||[]);r.onerror=()=>rej(r.error);});}
function put(b){return new Promise((res,rej)=>{const r=tx("readwrite").put(b);r.onsuccess=res;r.onerror=()=>rej(r.error);});}
function del(id){return new Promise((res,rej)=>{const r=tx("readwrite").delete(id);r.onsuccess=res;r.onerror=()=>rej(r.error);});}

/* ---------- State + helpers ---------- */
let entries = [], byLeaf = {}, expanded = new Set(), editingId = null, activeView = "browse";
const $ = s=>document.querySelector(s);
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function fmtDate(iso){const d=new Date(iso+"T00:00:00");return d.toLocaleDateString(undefined,{year:"numeric",month:"short",day:"numeric"});}
function esc(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function fmt(v){return (Math.round(v*10)/10).toFixed(1);}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
function buildByLeaf(){ byLeaf={}; for(const e of entries){ if(!e.leafId) continue; (byLeaf[e.leafId]=byLeaf[e.leafId]||[]).push(e); } }

/* ============================================================
   Learning projection engine (content-based, library-free).
   ============================================================ */
const NDIM = 10;
// Weighted toward the axes that actually drive liking (sensory research):
// bitterness/hop are the biggest divider, then sour/roast/malt; ABV & colour are
// descriptive, not preference-defining. [bitter,malt,body,sour,roast,fruit,hop,spice,abv,srm]
const FWEIGHT = [1.6,1.2,0.9,1.5,1.3,1.2,1.4,1.0,0.6,0.5];
const SHRINK_K = 3, SHRINK_DECAY = 6, MEAN_K0 = 2, GLOBAL_MEAN = 5.5, SIM_FLOOR = 0.1, BLEND = 0.6;
const NEUTRAL = 5.5;                     // shown only when there is no data at all
let ZFEAT = {}, GAMMA = 1, MEANF = [], POS = {};

function buildModel(){
  const mean=Array(NDIM).fill(0), sd=Array(NDIM).fill(0);
  for(const s of STYLES){ const f=CAT[s.id].feat; for(let d=0;d<NDIM;d++) mean[d]+=f[d]; }
  for(let d=0;d<NDIM;d++) mean[d]/=STYLES.length;
  for(const s of STYLES){ const f=CAT[s.id].feat; for(let d=0;d<NDIM;d++) sd[d]+=(f[d]-mean[d])**2; }
  for(let d=0;d<NDIM;d++){ sd[d]=Math.sqrt(sd[d]/STYLES.length) || 1; }
  MEANF = mean.slice();
  ZFEAT={};
  for(const s of STYLES){ const f=CAT[s.id].feat, z=[]; for(let d=0;d<NDIM;d++) z[d]=(f[d]-mean[d])/sd[d]; ZFEAT[s.id]=z; }
  const ds=[];
  for(let i=0;i<STYLES.length;i++) for(let j=i+1;j<STYLES.length;j++) ds.push(featDist(STYLES[i].id, STYLES[j].id));
  ds.sort((a,b)=>a-b);
  GAMMA = ds.length ? (ds[Math.floor(ds.length/2)] || 1) : 1;
  buildPositions();
}
function featDist(a,b){
  const za=ZFEAT[a], zb=ZFEAT[b];
  if(!za || !zb) return 99;
  let s=0;
  for(let d=0;d<NDIM;d++){ const diff=za[d]-zb[d]; s+=FWEIGHT[d]*diff*diff; }
  return Math.sqrt(s);
}
function treeSim(a,b){ return subOf(a)===subOf(b) ? 0.7 : (famOf(a)===famOf(b) ? 0.4 : 0); }

/* Constellation positions: x = light→intense, y = dry/bitter(top)→fruity(bottom). */
function buildPositions(){
  const items = STYLES.map(s=>{ const f=CAT[s.id].feat;
    const intensity = f[8]*0.45 + f[2]*0.8 + f[0]*0.5 + f[4]*0.5 + f[1]*0.3;   // abv,body,bitter,roast,malt
    const fy = f[5]*1.0 + f[3]*0.7 - f[0]*0.5 - f[6]*0.5;                       // fruit + sour − bitter − hop
    return {id:s.id, intensity, fy};
  });
  const ix=items.map(i=>i.intensity), fy=items.map(i=>i.fy);
  const mnX=Math.min(...ix), mxX=Math.max(...ix), mnY=Math.min(...fy), mxY=Math.max(...fy);
  POS={};
  for(const it of items){
    const x = 8 + (it.intensity-mnX)/((mxX-mnX)||1) * 84;
    const y = 14 + (it.fy-mnY)/((mxY-mnY)||1) * 74;
    POS[it.id] = {x,y};
  }
}

function ratedStyles(){
  const out=[];
  for(const sid in byLeaf){
    if(!styleExists(sid)) continue;
    const arr=byLeaf[sid];
    if(arr&&arr.length) out.push({id:sid, r:arr.reduce((a,b)=>a+b.rating,0)/arr.length});
  }
  return out;
}
function meanShrink(rated){
  const n = rated.length;
  if(!n) return SHRINK_K;
  const mean = rated.reduce((a,x)=>a+x.r,0)/n;
  const spread = Math.sqrt(rated.reduce((a,x)=>a+(x.r-mean)**2,0)/n);
  const evidence = n * (0.4 + 0.6*Math.min(1, spread/2));
  return SHRINK_K / (1 + evidence/SHRINK_DECAY);
}
/* Projected rating for a style you haven't logged: your overall average, nudged
   by how you've rated *similar* styles (flavour + tree similarity). No similar
   ratings → it stays at your average; the more similar beers you log, the more it
   moves. One concept — there's no separate stored "prior" anchor. */
function projectStyle(id){
  const rated = ratedStyles();
  if(!rated.length) return {value:NEUTRAL, confidence:0};
  const m = (MEAN_K0*GLOBAL_MEAN + rated.reduce((a,x)=>a+x.r,0)) / (MEAN_K0 + rated.length);
  const k = meanShrink(rated);
  let sumW=0, sumWR=0;
  for(const j of rated){
    if(j.id===id) continue;
    const sf = Math.exp(-(featDist(id,j.id)**2) / (2*GAMMA*GAMMA));
    const sim = BLEND*sf + (1-BLEND)*treeSim(id,j.id);
    if(sim < SIM_FLOOR) continue;
    sumW += sim; sumWR += sim*(j.r - m);
  }
  const value = clamp(m + sumWR/(k + sumW), 1, 10);
  return {value, confidence: sumW/(k + sumW)};
}

function effective(node){
  if(node.kids){
    const rs = node.kids.map(effective);
    return { value: rs.reduce((a,c)=>a+c.value,0)/rs.length,
             isReal: rs.some(c=>c.isReal),
             count:  rs.reduce((a,c)=>a+c.count,0),
             confidence: rs.reduce((a,c)=>a+(c.confidence||0),0)/rs.length };
  }
  const beers = byLeaf[node.id]||[];
  if(beers.length) return {value: beers.reduce((a,b)=>a+b.rating,0)/beers.length, isReal:true, count:beers.length, confidence:1};
  const p = projectStyle(node.id);
  return {value:p.value, isReal:false, count:0, confidence:p.confidence};
}

/* ---------- Score indicator (diamond) ---------- */
function scoreHTML(value, isReal, confidence){
  const hue = clamp(value*12, 0, 120);
  if(isReal) return `<span class="score"><span class="dia" style="color:hsl(${hue} 56% 56%)">&#9670;</span>${fmt(value)}</span>`;
  const c = confidence||0, op=(0.5+0.45*c).toFixed(2);
  return `<span class="score proj" style="color:hsl(${hue} 50% 60%);opacity:${op}"><span class="dia">&#9671;</span>~${fmt(value)}</span>`;
}
function stylesUnder(node){ return node.kids ? node.kids.flatMap(stylesUnder) : [node]; }
function triedCount(node){ return stylesUnder(node).filter(s=>(byLeaf[s.id]||[]).length).length; }

/* ============================================================
   BROWSE
   ============================================================ */
function renderBrowse(){
  buildByLeaf();
  const q = $("#search").value.trim().toLowerCase();
  if(q) return renderSearch(q);
  $("#tree").innerHTML = TAXONOMY.kids.map(renderRegion).join("");
}
function renderRegion(fam){
  const eff = effective(fam), open = expanded.has(fam.id), tried = triedCount(fam);
  let h = `<div class="region"><div class="region-head" data-kind="cat" data-id="${fam.id}">`+
            `<div class="region-l"><span class="tri ${open?'on':''}">${open?'&#9650;':'&#9654;'}</span>`+
            `<span class="region-nm">${esc(fam.name)}</span></div>`+
            `<div class="region-r">${tried?`<span class="tried">${tried} tried</span>`:""}${scoreHTML(eff.value,eff.isReal,eff.confidence)}</div></div>`;
  if(open) h += fam.kids.map(renderSub).join("");
  return h + `</div>`;
}
function renderSub(sub){
  const eff = effective(sub), open = expanded.has(sub.id);
  let h = `<div class="subregion"><div class="sub-head" data-kind="cat" data-id="${sub.id}">`+
            `<div class="sub-l"><span class="caret-sm">${open?'&#9662;':'&#9656;'}</span><span class="sub-nm">${esc(sub.name)}</span></div>`+
            scoreHTML(eff.value,eff.isReal,eff.confidence)+`</div>`;
  if(open){
    h += `<div class="styles">`;
    for(const st of sub.kids) h += renderStyle(st);
    h += `</div>`;
  }
  return h + `</div>`;
}
function renderStyle(st){
  const eff = effective(st);
  const beers = (byLeaf[st.id]||[]).slice().sort((a,b)=> b.rating-a.rating || (b.created||0)-(a.created||0));
  const logged = beers.length>0;
  let h = `<div class="style-row" data-kind="style" data-style="${st.id}">`+
            `<span class="style-nm ${logged?'on':''}">${esc(st.name)}${logged?`<span class="pill">${beers.length}</span>`:""}</span>`+
            scoreHTML(eff.value, eff.isReal, eff.confidence)+`</div>`;
  for(const b of beers)
    h += `<div class="beer-line" data-kind="beer" data-beer="${b.id}">&#8226; ${esc(b.name)}${b.brewery?` <span style="opacity:.7">· ${esc(b.brewery)}</span>`:""}</div>`;
  return h;
}
function renderSearch(q){
  const out=[];
  for(const s of STYLES) if(s.name.toLowerCase().includes(q)){
    const e=effective(CAT[s.id]);
    out.push(`<div class="style-row" data-kind="style" data-style="${s.id}" style="padding:9px 0;border-bottom:1px solid var(--line2)">`+
      `<span class="style-nm on">${esc(s.name)} <span style="color:var(--mut2);font-size:11px">· ${esc(s.group)}</span></span>`+
      scoreHTML(e.value,e.isReal,e.confidence)+`</div>`);
  }
  for(const e of entries) if(e.leafId && (e.name.toLowerCase().includes(q)||(e.brewery||"").toLowerCase().includes(q)))
    out.push(`<div class="style-row" data-kind="beer" data-beer="${e.id}" style="padding:9px 0;border-bottom:1px solid var(--line2)">`+
      `<span class="style-nm on">&#127866; ${esc(e.name)} <span style="color:var(--mut2);font-size:11px">· ${esc(CAT[e.leafId]?.name||"")}</span></span>`+
      scoreHTML(e.rating,true)+`</div>`);
  $("#tree").innerHTML = out.length ? out.join("") : `<div class="empty">No matches for “${esc(q)}”.</div>`;
}
function renderHead(){
  const logged = entries.filter(e=>e.leafId);
  const charted = new Set(logged.filter(e=>styleExists(e.leafId)).map(e=>e.leafId)).size;
  const total = STYLES.length;
  const pct = total ? Math.round(charted/total*100) : 0;
  $("#b-sub").textContent = `${logged.length} logged · ${charted} / ${total} styles`;
  $("#cov-fill").style.transform = `scaleX(${(pct/100).toFixed(3)})`;
  $("#cov-pct").textContent = pct+"%";
}

/* ============================================================
   PROFILE — constellation
   ============================================================ */
const AXES_HTML =
  `<div class="ax" style="left:10px;bottom:8px">LIGHT</div>`+
  `<div class="ax" style="right:10px;bottom:8px">INTENSE</div>`+
  `<div class="ax" style="left:10px;top:8px">DRY &amp; BITTER</div>`+
  `<div class="ax" style="left:10px;top:50%">FRUITY &#8595;</div>`;
function renderProfile(){
  buildByLeaf();
  let dots="";
  for(const s of STYLES){
    const e=effective(CAT[s.id]), p=POS[s.id], hue=clamp(e.value*12,0,120);
    if(e.isReal){
      const sz = 11 + Math.min(4, e.count-1);
      dots += `<span class="dot" style="left:${p.x}%;top:${p.y}%;width:${sz}px;height:${sz}px;background:hsl(${hue} 58% 55%);box-shadow:0 0 ${8+sz}px hsl(${hue} 70% 50% / .55)"></span>`;
    } else {
      const op=(0.3+0.42*(e.confidence||0)).toFixed(2), sz=5+Math.round(3*(e.confidence||0));
      dots += `<span class="dot" style="left:${p.x}%;top:${p.y}%;width:${sz}px;height:${sz}px;background:hsl(${hue} 50% 56%);opacity:${op}"></span>`;
    }
  }
  const rated = ratedStyles();
  if(rated.length){
    let wx=0,wy=0,sw=0;
    for(const j of rated){ const p=POS[j.id]; wx+=p.x*j.r; wy+=p.y*j.r; sw+=j.r; }
    dots += `<span class="you" style="left:${(wx/sw).toFixed(1)}%;top:${(wy/sw).toFixed(1)}%"><span class="you-ring"><span class="you-dot"></span></span><span class="you-lbl">YOU</span></span>`;
  }
  $("#constellation").innerHTML = AXES_HTML + dots;

  const logged = entries.filter(e=>e.leafId && styleExists(e.leafId));
  const ratings = logged.map(e=>e.rating);
  const charted = new Set(logged.map(e=>e.leafId)).size;
  $("#st-avg").textContent = ratings.length ? fmt(ratings.reduce((a,b)=>a+b,0)/ratings.length) : "–";
  $("#st-range").textContent = ratings.length ? `${fmt(Math.min(...ratings))}–${fmt(Math.max(...ratings))}` : "–";
  $("#st-styles").innerHTML = `${charted}<span class="u"> / ${STYLES.length}</span>`;
  // top family by styles tried, tie → highest score
  let best=null;
  for(const fam of TAXONOMY.kids){
    const t=triedCount(fam), sc=effective(fam).value;
    if(t>0 && (!best || t>best.t || (t===best.t && sc>best.sc))) best={name:fam.name,t,sc};
  }
  $("#st-top").textContent = best ? best.name : "–";
  $("#p-summary").innerHTML = tasteSummary(logged);
}
function tasteSummary(logged){
  if(!logged.length) return "Log a few beers to start mapping your taste.";
  const acc=Array(NDIM).fill(0); let sw=0;
  for(const e of logged){ if(!styleExists(e.leafId)) continue; const f=CAT[e.leafId].feat, w=e.rating; for(let d=0;d<NDIM;d++) acc[d]+=f[d]*w; sw+=w; }
  if(!sw) return "Log a few beers to start mapping your taste.";
  const p=acc.map(x=>x/sw), adj=[];
  if(p[0] < MEANF[0]-0.3) adj.push("low-bitterness");
  if(p[5] > MEANF[5]+0.3) adj.push("fruit-forward");
  if(p[3] > MEANF[3]+0.5) adj.push("tart");
  if(p[8] < MEANF[8]-0.3) adj.push("sessionable");
  if(p[4] > MEANF[4]+1) adj.push("roasty");
  if(p[1] > MEANF[1]+1) adj.push("malty");
  const lead = adj.slice(0,2).join(", ") || "balanced, easy-drinking";
  const triedBitter = logged.some(e=>styleExists(e.leafId) && CAT[e.leafId].feat[0]>=6);
  const triedBig    = logged.some(e=>styleExists(e.leafId) && CAT[e.leafId].feat[8]>=8);
  let tail="";
  if(!triedBitter && !triedBig) tail=" The hop-forward and high-ABV frontiers stay unexplored.";
  else if(!triedBitter) tail=" The hop-forward styles stay unexplored.";
  else if(!triedBig) tail=" The big, boozy styles stay unexplored.";
  return `You gravitate to <b>${lead}</b> styles.${tail}`;
}

function renderAll(){ buildByLeaf(); renderHead(); renderBrowse(); if(activeView==="profile") renderProfile(); }

/* ---------- Expansion ---------- */
function expandAncestors(styleId){ let p=styleId; while(p){ expanded.add(p); p=PARENT[p]; } }
function toggle(id){ expanded.has(id) ? expanded.delete(id) : expanded.add(id); }

/* ---------- View switch ---------- */
function setView(v){
  activeView=v;
  document.querySelectorAll(".seg button").forEach(b=>b.classList.toggle("on", b.dataset.view===v));
  $("#view-browse").hidden = v!=="browse";
  $("#view-profile").hidden = v!=="profile";
  if(v==="profile") renderProfile();
}

/* ---------- Onboarding ---------- */
let onbVals = {};   // styleId → rating, only for sliders the user actually touched
function renderOnboard(){
  onbVals = {};
  $("#onboard-list").innerHTML = CALIBRATION.map(c=>{
    const st = CAT[c.styleId];
    return `<div class="onb-row" data-style="${c.styleId}">
      <div class="onb-info"><div class="onb-name">${esc(c.name)}</div>
        <div class="onb-style">${esc(c.brewery)} · ${esc(st?st.name:c.styleId)}</div></div>
      <div class="onb-rate">
        <input type="range" class="onb-slider" min="1" max="10" step="0.5" value="6">
        <span class="onb-val mut">tap to rate</span>
        <button class="onb-clear" hidden title="Haven't had it">✕</button>
      </div></div>`;
  }).join("");
  $("#onboard-list").querySelectorAll(".onb-row").forEach(row=>{
    const sid=row.dataset.style, sl=row.querySelector(".onb-slider"),
          val=row.querySelector(".onb-val"), clr=row.querySelector(".onb-clear");
    sl.addEventListener("input", ()=>{
      const v=parseFloat(sl.value); onbVals[sid]=v;
      row.classList.add("touched"); val.classList.remove("mut");
      val.innerHTML=scoreHTML(v,true); clr.hidden=false;
    });
    clr.addEventListener("click", ()=>{
      delete onbVals[sid]; row.classList.remove("touched");
      val.classList.add("mut"); val.textContent="tap to rate"; clr.hidden=true; sl.value=6;
    });
  });
}
async function finishOnboard(){
  const answers=[], today=new Date().toISOString().slice(0,10); let i=0;
  for(const c of CALIBRATION){
    const v=onbVals[c.styleId];
    if(v==null) continue;
    answers.push({id:c.styleId, r:v});
    await put({ id:uid(), leafId:c.styleId, name:c.name, brewery:c.brewery||"", rating:v, notes:"", date:today, created:Date.now()+(i++) });
  }
  localStorage.setItem("palate_onboarded","1");
  entries = await getAll();
  buildByLeaf();
  expanded = new Set(["lagers","ales","hybrid","sour-wild"]);
  for(const e of entries) if(e.leafId) expandAncestors(e.leafId);
  showApp(); renderAll();   // land on the Map tree
}
function skipOnboard(){ localStorage.setItem("palate_onboarded","1"); showApp(); renderAll(); }
function showOnboard(){ renderOnboard(); $("#view-onboard").hidden=false; }
function showApp(){ $("#view-onboard").hidden=true; setView("browse"); }

/* ---------- Add / edit sheet ---------- */
function buildLeafSelect(){
  const groups={};
  for(const s of STYLES){ (groups[s.group]=groups[s.group]||[]).push(s); }
  $("#f-leaf").innerHTML = Object.entries(groups).map(([g,items])=>
    `<optgroup label="${g}">`+items.map(i=>`<option value="${i.id}">${i.name}</option>`).join("")+`</optgroup>`).join("");
}
function updateRatingBadge(){
  const v=parseFloat($("#f-rating").value), hue=clamp(v*12,0,120);
  $("#f-rating-badge").innerHTML = `<span class="score" style="font-size:15px"><span class="dia" style="color:hsl(${hue} 56% 56%)">&#9670;</span>${fmt(v)}</span>`;
}

/* ---------- Beer-name autocomplete (from catalog.js) ---------- */
let acItems = [], acActive = -1;
function acSearch(q){
  const cat = window.CATALOG || [];
  q = q.trim().toLowerCase();
  if(q.length < 2) return [];
  const toks = q.split(/\s+/);
  const scored = [];
  for(const b of cat){
    const nm = b.name.toLowerCase();
    if(!toks.every(t => nm.includes(t))) continue;
    let score = 0;
    if(nm.startsWith(q)) score = 2; else if(nm.includes(" "+q)) score = 1;
    scored.push({b, score});
  }
  scored.sort((x,y)=> y.score-x.score || x.b.name.localeCompare(y.b.name));
  return scored.slice(0,8).map(s=>s.b);
}
function acHighlight(name, q){
  const i = name.toLowerCase().indexOf(q.trim().toLowerCase());
  if(i<0 || q.trim().length<2) return esc(name);
  const n = q.trim().length;
  return esc(name.slice(0,i))+"<b>"+esc(name.slice(i,i+n))+"</b>"+esc(name.slice(i+n));
}
function acRender(q){
  acItems = acSearch(q); acActive = -1;
  const menu = $("#acMenu");
  if(!acItems.length){ menu.hidden = true; return; }
  menu.innerHTML = acItems.map((b,i)=>
    `<div class="ac-item" data-idx="${i}">`+
      `<span class="ac-nm">${acHighlight(b.name, q)}</span>`+
      `<span class="ac-meta">${esc(CAT[b.style]?.name||b.style)}</span>`+
    `</div>`).join("");
  menu.hidden = false;
}
function acHide(){ $("#acMenu").hidden = true; acItems = []; acActive = -1; }
function acSetActive(i){
  const els = $("#acMenu").querySelectorAll(".ac-item");
  if(!els.length) return;
  acActive = (i+els.length)%els.length;
  els.forEach((el,j)=> el.classList.toggle("active", j===acActive));
  els[acActive].scrollIntoView({block:"nearest"});
}
function acPick(b){
  $("#f-name").value = b.name;
  if(CAT[b.style]) $("#f-leaf").value = b.style;
  const notes = $("#f-notes");
  notes.value = b.notes || "";
  notes.classList.toggle("suggested", !!b.notes);   // dim = suggested, editable
  acHide(); validate();
}
function openEdit(styleId, beer){
  editingId = beer ? beer.id : null;
  $("#editTitle").textContent = beer ? "Edit beer" : "Log a beer";
  buildLeafSelect();
  $("#f-name").value    = beer?.name || "";
  $("#f-brewery").value = beer?.brewery || "";
  $("#f-notes").value   = beer?.notes || "";
  $("#f-notes").classList.remove("suggested");
  acHide();
  $("#f-leaf").value    = beer?.leafId || styleId || STYLES[0].id;
  $("#f-date").value    = beer?.date || new Date().toISOString().slice(0,10);
  $("#f-rating").value  = beer?.rating ?? 8;
  updateRatingBadge();
  $("#deleteBtn").hidden = !beer;
  validate();
  $("#editScrim").classList.add("show");
  $("#editSheet").classList.add("show");
}
function closeEdit(){ editingId=null; $("#editScrim").classList.remove("show"); $("#editSheet").classList.remove("show"); }
function validate(){ $("#saveBtn").disabled = !$("#f-name").value.trim(); }
async function save(){
  const name = $("#f-name").value.trim(); if(!name) return;
  const existing = editingId ? entries.find(b=>b.id===editingId) : null;
  const styleId = $("#f-leaf").value;
  const entry = {
    id: editingId || uid(), leafId: styleId, name,
    brewery: $("#f-brewery").value.trim(),
    rating: parseFloat($("#f-rating").value),
    notes: $("#f-notes").value.trim(),
    date: $("#f-date").value || new Date().toISOString().slice(0,10),
    created: existing ? (existing.created||Date.now()) : Date.now(),
  };
  await put(entry);
  entries = await getAll();
  expandAncestors(styleId);
  closeEdit(); renderAll();
}
async function removeCurrent(){
  if(!editingId) return;
  await del(editingId);
  entries = await getAll();
  closeEdit(); renderAll();
}

/* ---------- Backup / restore ---------- */
function exportData(){
  const blob = new Blob([JSON.stringify(entries,null,2)],{type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `palate-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}
function importData(file){
  const reader = new FileReader();
  reader.onload = async ()=>{
    try{
      const data = JSON.parse(reader.result);
      if(!Array.isArray(data)) throw 0;
      for(const b of data){ if(b && b.id && b.name) await put(b); }
      entries = await getAll(); await migrateEntries(); renderAll();
      alert("Backup restored.");
    }catch(e){ alert("That file couldn't be read as a Palate backup."); }
  };
  reader.readAsText(file);
}

/* ---------- Wire up ---------- */
$("#tree").addEventListener("click", e=>{
  const el = e.target.closest("[data-kind]"); if(!el) return;
  const k = el.dataset.kind;
  if(k==="beer"){ const b=entries.find(x=>x.id===el.dataset.beer); if(b){ $("#search").value=""; openEdit(b.leafId,b); } }
  else if(k==="style"){ openEdit(el.dataset.style, null); }
  else if(k==="cat"){ toggle(el.dataset.id); renderBrowse(); }
});
$("#search").addEventListener("input", ()=>{ renderBrowse(); });
$("#addBtn").onclick = ()=>openEdit(null, null);
$("#onbStart").onclick = finishOnboard;
$("#onbSkip").onclick = skipOnboard;
$("#startOverBtn").onclick = async ()=>{
  if(!confirm("Clear all your beers and ratings and start fresh?")) return;
  try{ db && db.close(); }catch(_){}
  await new Promise(r=>{const req=indexedDB.deleteDatabase(DB_NAME);req.onsuccess=req.onerror=req.onblocked=r;});
  localStorage.removeItem("palate_onboarded");
  location.reload();
};
document.querySelectorAll(".seg button").forEach(b=> b.onclick = ()=>setView(b.dataset.view));
$("#cancelBtn").onclick = closeEdit;
$("#editScrim").onclick = closeEdit;
$("#saveBtn").onclick = save;
$("#deleteBtn").onclick = removeCurrent;
$("#f-name").addEventListener("input", e=>{ validate(); acRender(e.target.value); });
$("#f-name").addEventListener("keydown", e=>{
  if($("#acMenu").hidden) return;
  if(e.key==="ArrowDown"){ e.preventDefault(); acSetActive(acActive+1); }
  else if(e.key==="ArrowUp"){ e.preventDefault(); acSetActive(acActive-1); }
  else if(e.key==="Enter" && acActive>=0){ e.preventDefault(); acPick(acItems[acActive]); }
  else if(e.key==="Escape"){ acHide(); }
});
$("#f-name").addEventListener("blur", ()=> setTimeout(acHide, 120));
$("#acMenu").addEventListener("mousedown", e=>{
  const el = e.target.closest(".ac-item"); if(!el) return;
  e.preventDefault(); acPick(acItems[+el.dataset.idx]);
});
$("#f-notes").addEventListener("input", ()=> $("#f-notes").classList.remove("suggested"));
$("#f-rating").addEventListener("input", updateRatingBadge);
$("#exportBtn").onclick = exportData;
$("#importBtn").onclick = ()=>$("#importFile").click();
$("#importFile").onchange = e=>{ if(e.target.files[0]) importData(e.target.files[0]); };
$("#expandBtn").addEventListener("click", ()=>{
  const allCats = Object.keys(CAT);
  const allOpen = allCats.every(id=>expanded.has(id));
  if(allOpen){ expanded = new Set(["lagers","ales","hybrid","sour-wild"]); $("#expandBtn").textContent="Expand all"; }
  else { expanded = new Set(allCats); $("#expandBtn").textContent="Collapse"; }
  renderBrowse();
});

/* ---------- Boot ---------- */
(async ()=>{
  buildModel();
  await openDB();
  entries = await getAll();
  await migrateEntries();
  buildByLeaf();
  if(entries.length === 0 && !localStorage.getItem("palate_onboarded")){
    showOnboard();                       // fresh user → calibration intro
  } else {
    expanded = new Set(["lagers","ales","hybrid","sour-wild"]);
    for(const e of entries) if(e.leafId) expandAncestors(e.leafId);
    renderAll();
  }
  if("serviceWorker" in navigator){ navigator.serviceWorker.register("sw.js").catch(()=>{}); }
})();
</script>
