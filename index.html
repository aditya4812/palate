<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>Palate</title>

<!-- PWA / iOS home-screen -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#120d08">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Palate">
<link rel="apple-touch-icon" href="icon-180.png">

<style>
  :root{
    --bg:#120d08;
    --bg2:#1c140c;
    --card:#241a10;
    --line:#3a2a18;
    --amber:#e0a020;
    --amber-bright:#f5c049;
    --foam:#f3efe4;
    --text:#ece3d4;
    --muted:#9c8a72;
    --danger:#e0654a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:
      radial-gradient(120% 70% at 50% -10%, #2a1d10 0%, var(--bg) 55%) fixed,
      var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    min-height:100vh;
    padding:
      max(16px, env(safe-area-inset-top)) 16px
      calc(96px + env(safe-area-inset-bottom)) 16px;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:560px;margin:0 auto}

  /* Header */
  header{position:relative;padding:6px 2px 14px}
  h1{
    font-family:"Iowan Old Style",Georgia,"Times New Roman",serif;
    font-size:34px;font-weight:700;letter-spacing:.3px;margin:0;
    color:var(--foam);
  }
  .tag{color:var(--muted);font-size:13px;margin-top:2px}

  /* Section selector */
  .sections{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
  .pill{
    display:inline-flex;align-items:center;gap:6px;padding:9px 15px;border-radius:999px;
    border:1px solid var(--line);background:#16100a;color:var(--muted);
    font-size:14px;font-weight:600;cursor:pointer;transition:.15s;
  }
  .pill.active{
    background:linear-gradient(180deg,var(--amber-bright),var(--amber));
    color:#211505;border-color:var(--amber);
  }

  /* Stats */
  .stats{
    display:flex;margin-top:14px;border:1px solid var(--line);
    border-radius:16px;background:linear-gradient(180deg,var(--bg2),#160f09);
    overflow:hidden;
  }
  .stat{flex:1;text-align:center;padding:13px 6px;position:relative}
  .stat + .stat::before{content:"";position:absolute;left:0;top:18%;height:64%;width:1px;background:var(--line)}
  .stat b{display:block;font-family:Georgia,serif;font-size:22px;color:var(--amber-bright);line-height:1}
  .stat span{display:block;font-size:11px;color:var(--muted);margin-top:5px;letter-spacing:.4px;text-transform:uppercase}

  /* Add button */
  .add{
    display:flex;align-items:center;justify-content:center;gap:9px;
    width:100%;margin-top:16px;padding:15px;border:none;cursor:pointer;
    background:linear-gradient(180deg,var(--amber-bright),var(--amber));
    color:#211505;font-weight:700;font-size:16px;border-radius:14px;
    box-shadow:0 6px 18px -6px rgba(224,160,32,.6);
  }
  .add:active{transform:translateY(1px)}

  /* Search */
  .search{
    width:100%;margin-top:16px;padding:12px 14px;border-radius:12px;
    border:1px solid var(--line);background:#16100a;color:var(--text);
    font-size:15px;outline:none;
  }
  .search::placeholder{color:#6f6049}

  /* List */
  .list{margin-top:14px;display:flex;flex-direction:column;gap:11px}
  .card{
    border:1px solid var(--line);border-radius:15px;padding:14px 15px;
    background:linear-gradient(180deg,var(--card),#1d150d);cursor:pointer;
    transition:border-color .15s;
  }
  .card:active{border-color:var(--amber)}
  .card .top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
  .card .name{font-family:Georgia,serif;font-size:18px;font-weight:600;color:var(--foam);line-height:1.2}
  .card .meta{margin-top:5px;font-size:13px}
  .card .style{color:var(--amber)}
  .card .brewery{color:var(--muted)}
  .card .notes{margin-top:8px;font-size:13px;color:#bcae97;line-height:1.45;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .card .date{margin-top:8px;font-size:11px;color:#6f6049;letter-spacing:.3px}

  /* Pour rating (signature element) */
  .pour{display:flex;gap:3px;flex-shrink:0;padding-top:3px}
  .seg{width:10px;height:18px;border-radius:2px;background:#2e2114;
    border:1px solid #3d2c19;position:relative;overflow:hidden}
  .seg.on{background:linear-gradient(180deg,var(--amber-bright),var(--amber));border-color:var(--amber)}

  /* Empty */
  .empty{text-align:center;padding:64px 20px;color:var(--muted)}
  .empty .mug{font-size:60px;filter:saturate(.9)}
  .empty h2{font-family:Georgia,serif;color:var(--text);font-weight:600;margin:14px 0 6px;font-size:20px}
  .empty p{margin:0;font-size:14px;line-height:1.5}

  /* Sheet (add/edit) */
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(3px);
    opacity:0;pointer-events:none;transition:opacity .2s;z-index:10}
  .scrim.show{opacity:1;pointer-events:auto}
  .sheet{
    position:fixed;left:0;right:0;bottom:0;z-index:11;
    background:var(--bg2);border-top:1px solid var(--line);
    border-radius:22px 22px 0 0;padding:8px 18px calc(24px + env(safe-area-inset-bottom));
    max-width:560px;margin:0 auto;max-height:92vh;overflow-y:auto;
    transform:translateY(100%);transition:transform .25s cubic-bezier(.32,.72,0,1);
  }
  .sheet.show{transform:translateY(0)}
  .grab{width:38px;height:4px;border-radius:3px;background:#4a3826;margin:8px auto 14px}
  .sheet h3{font-family:Georgia,serif;font-size:20px;margin:0 0 16px;color:var(--foam)}
  label{display:block;font-size:12px;color:var(--muted);margin:14px 0 6px;letter-spacing:.4px;text-transform:uppercase}
  input[type=text],input[type=date],select,textarea{
    width:100%;padding:13px 13px;border-radius:11px;border:1px solid var(--line);
    background:#16100a;color:var(--text);font-size:16px;font-family:inherit;outline:none;
  }
  input:focus,select:focus,textarea:focus{border-color:var(--amber)}
  textarea{resize:vertical;min-height:70px;line-height:1.45}
  select{appearance:none;-webkit-appearance:none;
    background-image:linear-gradient(45deg,transparent 50%,var(--amber) 50%),linear-gradient(135deg,var(--amber) 50%,transparent 50%);
    background-position:calc(100% - 18px) 19px,calc(100% - 13px) 19px;background-size:5px 5px;background-repeat:no-repeat}

  .pourpick{display:flex;gap:8px;margin-top:2px}
  .pourpick .seg{cursor:pointer;width:42px;height:44px;border-radius:6px}

  .actions{display:flex;gap:10px;margin-top:24px}
  .btn{flex:1;padding:14px;border-radius:12px;border:1px solid var(--line);
    background:#1d150d;color:var(--text);font-size:15px;font-weight:600;cursor:pointer}
  .btn.primary{background:linear-gradient(180deg,var(--amber-bright),var(--amber));
    color:#211505;border:none}
  .btn.primary:disabled{opacity:.45}
  .btn.del{background:none;border:none;color:var(--danger);margin-top:10px;width:100%;padding:12px;font-size:14px;cursor:pointer}

  /* Backup footer */
  .foot{margin-top:30px;display:flex;gap:10px;justify-content:center}
  .foot button{background:none;border:1px solid var(--line);color:var(--muted);
    font-size:12px;padding:9px 14px;border-radius:10px;cursor:pointer}
  .foot button:active{color:var(--amber);border-color:var(--amber)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Palate</h1>
    <div class="tag">Your tasting journal · everything stays on this device</div>
    <div class="sections" id="sections"></div>
    <div class="stats">
      <div class="stat"><b id="s-count">0</b><span>logged</span></div>
      <div class="stat"><b id="s-avg">–</b><span id="s-avg-label">avg rating</span></div>
      <div class="stat"><b id="s-styles">0</b><span id="s-styles-label">styles</span></div>
    </div>
    <button class="add" id="addBtn">Log</button>
    <input class="search" id="search" placeholder="Search">
  </header>

  <div class="list" id="list"></div>

  <div class="foot">
    <button id="exportBtn">⬇ Backup to file</button>
    <button id="importBtn">⬆ Restore backup</button>
    <input type="file" id="importFile" accept="application/json" hidden>
  </div>
</div>

<!-- Add/Edit sheet -->
<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet">
  <div class="grab"></div>
  <h3 id="sheetTitle">Log</h3>

  <label id="l-name">Name</label>
  <input type="text" id="f-name" placeholder="" autocomplete="off">

  <label id="l-style">Style</label>
  <select id="f-style"></select>

  <label id="l-brewery">Maker <span style="text-transform:none;color:#6f6049">(optional)</span></label>
  <input type="text" id="f-brewery" placeholder="" autocomplete="off">

  <label id="l-rating">Rating</label>
  <div class="pourpick" id="f-rating"></div>

  <label>Tasting notes <span style="text-transform:none;color:#6f6049">(optional)</span></label>
  <textarea id="f-notes" placeholder="Bright citrus, crisp finish…"></textarea>

  <label>Date tried</label>
  <input type="date" id="f-date">

  <div class="actions">
    <button class="btn" id="cancelBtn">Cancel</button>
    <button class="btn primary" id="saveBtn">Save</button>
  </div>
  <button class="btn del" id="deleteBtn" hidden>Delete this entry</button>
</div>

<script>
/* ---------- Sections (add more here later: wine, coffee, whisky…) ---------- */
const SECTIONS = {
  beer: {
    label: "Beer",
    emoji: "🍺",
    noun: "beer",
    ratingWord: "pour",          // shows as "avg pour"
    namePlaceholder: "e.g. Yuzu KSA",
    styleLabel: "Style",
    makerLabel: "Brewery",
    makerPlaceholder: "e.g. Kona Brewing",
    styleGroups: [
      ["Wheat & Kölsch  ★ your zone", ["Hefeweizen","Witbier","American Wheat","Dunkelweizen","Kölsch","Yuzu KSA / Fruit Kölsch"]],
      ["Fruit & Specialty  ★ your zone", ["Radler / Shandy","Fruit Wheat Ale","Fruited Sour"]],
      ["Pale Lagers  ★ your zone", ["Euro Pale Lager","Helles","Italian Pilsner","Czech Pilsner","American Lager","German Pilsner"]],
      ["Other Lagers", ["Vienna Lager","Märzen / Festbier","Dortmunder Export","Schwarzbier","Dunkel","Kellerbier"]],
      ["Dark Ales", ["Irish Dry Stout","Nitro Stout","Oatmeal Stout","Porter","Brown Ale"]],
      ["Pale Ales & IPAs", ["Blonde Ale","Cream Ale","English Pale Ale","American Pale Ale","New England IPA","West Coast IPA","Double IPA"]],
      ["Belgian & Sour", ["Saison","Dubbel","Tripel","Gose","Berliner Weisse","Lambic / Gueuze"]],
      ["Other", ["Other / Not sure"]],
    ],
  },
};
const SECTION_KEYS = Object.keys(SECTIONS);
let activeSection = SECTION_KEYS[0];
const sec = ()=>SECTIONS[activeSection];

/* ---------- IndexedDB storage ---------- */
const DB_NAME = "palate", STORE = "entries";
let db;
function openDB(){
  return new Promise((res,rej)=>{
    const r = indexedDB.open(DB_NAME,1);
    r.onupgradeneeded = e=>{
      const d = e.target.result;
      if(!d.objectStoreNames.contains(STORE)) d.createObjectStore(STORE,{keyPath:"id"});
    };
    r.onsuccess = e=>{db=e.target.result;res();};
    r.onerror = e=>rej(e.target.error);
  });
}
function tx(mode){return db.transaction(STORE,mode).objectStore(STORE);}
function getAll(){return new Promise((res,rej)=>{const r=tx("readonly").getAll();r.onsuccess=()=>res(r.result||[]);r.onerror=()=>rej(r.error);});}
function put(b){return new Promise((res,rej)=>{const r=tx("readwrite").put(b);r.onsuccess=res;r.onerror=()=>rej(r.error);});}
function del(id){return new Promise((res,rej)=>{const r=tx("readwrite").delete(id);r.onsuccess=res;r.onerror=()=>rej(r.error);});}

/* ---------- State + helpers ---------- */
let entries = [];
let editingId = null;
let formRating = 3;
const $ = s=>document.querySelector(s);
const sectionOf = e => e.section || "beer";   // back-compat for old entries

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function fmtDate(iso){
  const d = new Date(iso+"T00:00:00");
  return d.toLocaleDateString(undefined,{year:"numeric",month:"short",day:"numeric"});
}
function pourHTML(n){
  let s = `<div class="pour">`;
  for(let i=1;i<=5;i++) s+=`<div class="seg${i<=n?' on':''}"></div>`;
  return s+"</div>";
}
function esc(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

/* ---------- Section selector ---------- */
function renderSections(){
  $("#sections").innerHTML = SECTION_KEYS.map(k=>{
    const s = SECTIONS[k];
    return `<button class="pill${k===activeSection?' active':''}" data-sec="${k}">${s.emoji} ${s.label}</button>`;
  }).join("");
}

/* ---------- Render ---------- */
function applySectionChrome(){
  const s = sec();
  $("#addBtn").textContent = `${s.emoji} Log a ${s.noun}`;
  $("#search").placeholder = `Search ${s.label.toLowerCase()} by name, style, or ${s.makerLabel.toLowerCase()}`;
  $("#s-avg-label").textContent = `avg ${s.ratingWord}`;
}
function render(){
  applySectionChrome();
  const mine = entries.filter(e=>sectionOf(e)===activeSection);

  $("#s-count").textContent = mine.length;
  $("#s-styles").textContent = new Set(mine.map(b=>b.style)).size;
  $("#s-avg").textContent = mine.length
    ? (mine.reduce((a,b)=>a+b.rating,0)/mine.length).toFixed(1) : "–";

  const q = $("#search").value.trim().toLowerCase();
  let rows = [...mine].sort((a,b)=> b.date.localeCompare(a.date) || b.created-a.created);
  if(q) rows = rows.filter(b =>
    b.name.toLowerCase().includes(q) ||
    b.style.toLowerCase().includes(q) ||
    (b.brewery||"").toLowerCase().includes(q));

  const list = $("#list");
  if(!mine.length){
    list.innerHTML = `<div class="empty"><div class="mug">${sec().emoji}</div>
      <h2>No ${sec().noun}s logged yet</h2><p>Tap “Log a ${sec().noun}” to add the first one you try.</p></div>`;
    return;
  }
  if(!rows.length){
    list.innerHTML = `<div class="empty"><p>No matches for “${esc(q)}”.</p></div>`;
    return;
  }
  list.innerHTML = rows.map(b=>`
    <div class="card" data-id="${b.id}">
      <div class="top">
        <div class="name">${esc(b.name)}</div>
        ${pourHTML(b.rating)}
      </div>
      <div class="meta">
        <span class="style">${esc(b.style)}</span>${b.brewery?` <span class="brewery">· ${esc(b.brewery)}</span>`:""}
      </div>
      ${b.notes?`<div class="notes">${esc(b.notes)}</div>`:""}
      <div class="date">${fmtDate(b.date)}</div>
    </div>`).join("");
}

/* ---------- Sheet ---------- */
function buildStyleOptions(){
  $("#f-style").innerHTML = sec().styleGroups.map(([g,items])=>
    `<optgroup label="${g}">`+items.map(i=>`<option>${i}</option>`).join("")+`</optgroup>`).join("");
}
function buildRatingPicker(){
  const wrap = $("#f-rating"); wrap.innerHTML="";
  for(let i=1;i<=5;i++){
    const seg = document.createElement("div");
    seg.className="seg"+(i<=formRating?" on":"");
    seg.onclick=()=>{formRating=i;buildRatingPicker();};
    wrap.appendChild(seg);
  }
}
function openSheet(beer){
  const s = sec();
  editingId = beer ? beer.id : null;
  $("#sheetTitle").textContent = beer ? `Edit ${s.noun}` : `Log a ${s.noun}`;
  $("#l-name").textContent = `${s.label} name`;
  $("#l-style").textContent = s.styleLabel;
  $("#l-rating").textContent = `Your ${s.ratingWord} rating`;
  $("#l-brewery").innerHTML = `${s.makerLabel} <span style="text-transform:none;color:#6f6049">(optional)</span>`;
  $("#f-name").placeholder = s.namePlaceholder;
  $("#f-brewery").placeholder = s.makerPlaceholder;
  buildStyleOptions();
  $("#f-name").value = beer?.name || "";
  $("#f-brewery").value = beer?.brewery || "";
  $("#f-notes").value = beer?.notes || "";
  $("#f-style").value = beer?.style || sec().styleGroups[0][1][0];
  $("#f-date").value = beer?.date || new Date().toISOString().slice(0,10);
  formRating = beer?.rating || 3;
  buildRatingPicker();
  $("#deleteBtn").hidden = !beer;
  validate();
  $("#scrim").classList.add("show");
  $("#sheet").classList.add("show");
}
function closeSheet(){
  $("#scrim").classList.remove("show");
  $("#sheet").classList.remove("show");
}
function validate(){ $("#saveBtn").disabled = !$("#f-name").value.trim(); }

async function save(){
  const name = $("#f-name").value.trim();
  if(!name) return;
  const existing = editingId ? entries.find(b=>b.id===editingId) : null;
  const entry = {
    id: editingId || uid(),
    section: existing ? sectionOf(existing) : activeSection,
    name,
    style: $("#f-style").value,
    brewery: $("#f-brewery").value.trim(),
    rating: formRating,
    notes: $("#f-notes").value.trim(),
    date: $("#f-date").value || new Date().toISOString().slice(0,10),
    created: existing ? (existing.created||Date.now()) : Date.now(),
  };
  await put(entry);
  entries = await getAll();
  closeSheet(); render();
}
async function removeCurrent(){
  if(!editingId) return;
  await del(editingId);
  entries = await getAll();
  closeSheet(); render();
}

/* ---------- Backup / restore ---------- */
function exportData(){
  const blob = new Blob([JSON.stringify(entries,null,2)],{type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `palate-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}
function importData(file){
  const reader = new FileReader();
  reader.onload = async ()=>{
    try{
      const data = JSON.parse(reader.result);
      if(!Array.isArray(data)) throw 0;
      for(const b of data){ if(b && b.id && b.name){ if(!b.section) b.section="beer"; await put(b); } }
      entries = await getAll(); render();
      alert("Backup restored.");
    }catch(e){ alert("That file couldn't be read as a Palate backup."); }
  };
  reader.readAsText(file);
}

/* ---------- Wire up ---------- */
$("#addBtn").onclick = ()=>openSheet(null);
$("#cancelBtn").onclick = closeSheet;
$("#scrim").onclick = closeSheet;
$("#saveBtn").onclick = save;
$("#deleteBtn").onclick = removeCurrent;
$("#f-name").addEventListener("input", validate);
$("#search").addEventListener("input", render);
$("#exportBtn").onclick = exportData;
$("#importBtn").onclick = ()=>$("#importFile").click();
$("#importFile").onchange = e=>{ if(e.target.files[0]) importData(e.target.files[0]); };
$("#list").addEventListener("click", e=>{
  const card = e.target.closest(".card"); if(!card) return;
  const beer = entries.find(b=>b.id===card.dataset.id);
  if(beer) openSheet(beer);
});
$("#sections").addEventListener("click", e=>{
  const pill = e.target.closest(".pill"); if(!pill) return;
  activeSection = pill.dataset.sec;
  $("#search").value = "";
  renderSections(); render();
});

/* ---------- Boot ---------- */
(async ()=>{
  renderSections();
  await openDB();
  entries = await getAll();
  render();
  if("serviceWorker" in navigator){
    navigator.serviceWorker.register("sw.js").catch(()=>{});
  }
})();
</script>
</body>
</html>
